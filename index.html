<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>机场旅客定位测试(国航内部预览版v0.9)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      --bg: #14090b;
      --surface: #221115;
      --border: #4a2429;
      --text: #f2ebe8;
      --muted: #b9a9a2;
      --accent: #c30f2f;
      --gold: #d4a34a;
      --success: #b58a34;
      --danger: #8f1010;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(212, 163, 74, 0.2), transparent 30%),
        radial-gradient(circle at 95% 8%, rgba(195, 15, 47, 0.35), transparent 40%),
        linear-gradient(180deg, #230b10 0%, #14090b 44%, #0d0809 100%);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--gold);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }
    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0;
      font-size: 0.84rem;
    }
    .row .label { color: var(--muted); }
    .row .value {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
    }
    .steps-big {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      text-align: right;
      line-height: 1.1;
      padding: 0;
    }
    .steps-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
    }
    .steps-label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .steps-head-vi {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 52%;
    }
    .steps-head-vi .vi-bar {
      flex: 1;
      margin-top: 0;
    }
    .steps-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      align-items: end;
      margin-bottom: 0.35rem;
    }
    .steps-box {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 0.5rem;
    }
    .steps-box .label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .steps-distance {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
      font-size: 1.35rem;
      color: var(--text);
    }
    .vi-wrap {
      margin-top: 0.45rem;
    }
    .vi-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 0.22rem;
    }
    .vi-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #12121a;
      overflow: hidden;
    }
    .vi-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), #d97f2b, var(--accent));
      transition: width 120ms linear;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.45rem;
      margin-top: 0.75rem;
    }
    button {
      padding: 0.62rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start {
      background: var(--accent);
      color: #fff;
    }
    .btn-stop {
      background: var(--danger);
      color: #fff;
    }
    .btn-download {
      background: var(--border);
      color: var(--text);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      padding: 0.32rem 0.65rem;
      border-radius: 8px;
      margin-bottom: 0.7rem;
    }
    .status.idle { background: rgba(52, 199, 89, 0.18); color: #53d36b; }
    .status.recording { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
    .status.tab-status {
      margin: 0;
      border-radius: 999px;
      padding: 0.28rem 0.6rem;
      font-size: 0.72rem;
      line-height: 1;
      white-space: nowrap;
    }
    .trajectory-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    .trajectory-title-row h2 {
      margin: 0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .status.recording .status-dot {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .message {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }
    .trajectory-card {
      overflow: hidden;
    }
    .trajectory-map-wrap.orienta-map-frame {
      position: relative;
      width: 100%;
      height: 390px;
      background: #0a0a0a;
      border: 3px solid #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      margin-top: 0.35rem;
    }
    #trajectoryMap {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      z-index: 0;
    }
    /* OSM dark theme */
    .orienta-map-frame .leaflet-tile-pane {
      filter: brightness(0.35) saturate(0.3) contrast(1.25);
    }
    .orienta-map-frame .leaflet-control-zoom {
      background: #1a1a1a !important;
      border: 1px solid #333 !important;
      border-radius: 6px;
    }
    .orienta-map-frame .leaflet-control-zoom a {
      color: #e8e8e8 !important;
      background: transparent !important;
    }
    .orienta-map-frame .leaflet-control-zoom a:hover {
      background: #2a2a2a !important;
    }
    .origin-marker-gate {
      background: transparent;
      border: none;
    }
    .gate-marker-inner {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4a9eff 0%, #1a5fcf 100%);
      border: 2.5px solid #ffffff;
      box-shadow: 0 0 12px rgba(45, 127, 255, 0.9);
    }
    .user-arrow-wrapper {
      background: transparent;
      border: none;
    }
    .user-arrow-icon {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 24px solid #53d36b;
      transform-origin: 50% 66%;
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 8px rgba(83, 211, 107, 0.8));
    }
    .trajectory-card.recording .user-arrow-icon {
      border-bottom-color: #ff453a;
      filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 8px rgba(255, 69, 58, 0.8));
    }
    .trajectory-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.45rem;
      font-size: 0.74rem;
      color: var(--muted);
      gap: 0.5rem;
    }
    .trajectory-btn-group {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
      flex-shrink: 0;
    }
    .btn-reset-all, .btn-reset-trajectory {
      padding: 0.45rem 0.55rem;
      font-size: 0.72rem;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-indoor-correction {
      padding: 0.45rem 0.55rem;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
    }
    .btn-indoor-correction.enabled {
      border-color: #2f66d0;
      background: rgba(74, 158, 255, 0.2);
      color: #d7e8ff;
    }
    .btn-reset-all { padding: 0.62rem 0.65rem; font-size: 0.85rem; }
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.6rem;
    }
    .sensor-block {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.5rem;
      background: rgba(255, 255, 255, 0.01);
    }
    .sensor-title {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sensor-plot {
      width: 100%;
      height: 90px;
      background: #12121a;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: block;
    }
    .sensor-values {
      margin-top: 0.35rem;
      display: flex;
      gap: 0.5rem;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }
    .sensor-values .value {
      color: var(--text);
    }
    .sensor-video-switcher {
      margin-bottom: 0.75rem;
    }
    .switch-tags {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
      padding: 0.22rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 100%;
      align-items: center;
    }
    .switch-tag {
      padding: 0.28rem 0.72rem;
      font-size: 0.72rem;
      line-height: 1;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      border: none;
      flex: 1 1 0;
      text-align: center;
    }
    .switch-tag.active {
      color: #fff;
      background: linear-gradient(90deg, var(--accent), #8d1736);
    }
    .switch-tag.hidden {
      display: none;
    }
    .overlap-stage {
      position: static;
      min-height: 0;
      overflow: visible;
      height: auto !important;
    }
    .stack-card {
      position: static;
      top: auto;
      left: auto;
      width: 100%;
      margin: 0 0 0.75rem 0;
      transition: none;
      overflow: hidden;
      transform: none !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
    .stack-card.is-hidden {
      display: none;
    }
    @media (max-width: 420px) {
      .sensor-grid {
        grid-template-columns: 1fr;
      }
      .trajectory-map-wrap {
        height: 330px;
      }
      .stack-card {
        width: 96%;
      }
      .overlap-stage[data-active="sensors"] .video-stack-card {
        transform: translateX(calc(-50% + 12px)) scale(0.98);
      }
      .overlap-stage[data-active="video"] .sensor-stack-card {
        transform: translateX(calc(-50% - 12px)) scale(0.98);
      }
    }
    .video-preview-wrap {
      position: relative;
      width: 100%;
      height: 170px;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .video-preview-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-preview-wrap .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .video-zoom-controls {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .video-zoom-controls.visible {
      display: flex;
    }
    .video-zoom-controls button {
      padding: 0.4rem 0.75rem;
      font-size: 1rem;
      min-width: 2.5rem;
    }
    .video-zoom-controls input[type="range"] {
      flex: 1;
      min-width: 80px;
    }
    .video-zoom-controls .zoom-value {
      min-width: 2.5rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>机场旅客定位测试(国航内部预览版v0.9)</h1>

    <div class="sensor-video-switcher">
      <div class="switch-tags" role="tablist" aria-label="页面切换">
        <button type="button" id="tagTrajectory" class="switch-tag active" role="tab" aria-selected="true">轨迹</button>
        <button type="button" id="tagVideo" class="switch-tag" role="tab" aria-selected="false">视频</button>
      </div>
    </div>

    <div id="stepsCard" class="card">
      <h2>步数 · 距离</h2>
      <div class="steps-header-row">
        <span class="steps-label">VI 强度</span>
        <div class="steps-head-vi">
          <div class="vi-bar"><div id="viFillTop" class="vi-fill"></div></div>
          <span id="viValueTop" style="font-size:0.78rem;color:var(--muted);min-width:1.2rem;text-align:right;">0</span>
        </div>
      </div>
      <div class="steps-summary">
        <div class="steps-box">
          <span class="label">步数</span>
          <div class="steps-big" id="stepsCount">0</div>
        </div>
        <div class="steps-box">
          <span class="label">距离 (m)</span>
          <span class="steps-distance" id="distanceDisplay">0.00</span>
        </div>
      </div>
    </div>

    <div id="trajectoryCard" class="card trajectory-card">
      <p id="mapHint" class="message" style="margin-bottom:0.5rem">先点击用户箭头调整位置，再点击开始</p>
      <div class="trajectory-map-wrap orienta-map-frame">
        <div id="trajectoryMap"></div>
      </div>
      <div class="trajectory-actions">
        <span id="trajectoryInfo"></span>
        <div class="trajectory-btn-group">
          <div id="status" class="status tab-status idle">
            <span class="status-dot"></span>
            <span id="statusText">就绪</span>
          </div>
          <button type="button" id="btnIndoorCorrection" class="btn-indoor-correction">室内环境修正: 关</button>
          <button type="button" id="btnResetTrajectory" class="btn-reset-trajectory">重置</button>
        </div>
      </div>
    </div>

    <div class="sensor-video-switcher">
      <div id="sensorVideoStage" class="overlap-stage" data-active="sensors">
      <div id="sensorCard" class="card stack-card sensor-stack-card is-hidden">
        <h2>传感器</h2>
        <div class="sensor-grid">
          <div class="sensor-block">
            <div class="sensor-title">加速度 (m/s²)</div>
            <canvas id="accPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>x: <span class="value" id="accX">—</span></span>
              <span>y: <span class="value" id="accY">—</span></span>
              <span>z: <span class="value" id="accZ">—</span></span>
            </div>
          </div>
          <div class="sensor-block">
            <div class="sensor-title">陀螺仪 (deg/s)</div>
            <canvas id="gyroPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>a: <span class="value" id="gyroAlpha">—</span></span>
              <span>b: <span class="value" id="gyroBeta">—</span></span>
              <span>g: <span class="value" id="gyroGamma">—</span></span>
            </div>
          </div>
          <div class="sensor-block">
            <div class="sensor-title">姿态 / 磁力计</div>
            <canvas id="orientPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>a: <span class="value" id="orientAlpha">—</span></span>
              <span>b: <span class="value" id="orientBeta">—</span></span>
              <span>g: <span class="value" id="orientGamma">—</span></span>
            </div>
          </div>
        </div>
      </div>
      <div id="videoCard" class="card stack-card video-stack-card">
        <div class="video-preview-wrap">
          <video id="videoPreview" playsinline muted autoplay style="display:none"></video>
          <div id="videoPlaceholder" class="video-placeholder"></div>
        </div>
        <div id="videoZoomWrap" class="video-zoom-controls">
          <button type="button" id="btnZoomOut" aria-label="缩小">−</button>
          <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1" aria-label="缩放">
          <span id="zoomValue" class="zoom-value">1×</span>
          <button type="button" id="btnZoomIn" aria-label="放大">+</button>
        </div>
      </div>
      </div>
    </div>

    <p id="message" class="message"></p>

    <div class="buttons">
      <button id="btnStart" class="btn-start">开始</button>
      <button id="btnStop" class="btn-stop" disabled>停止</button>
      <button id="btnResetAll" class="btn-reset-all">重置全部</button>
    </div>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const stepsEl = document.getElementById('stepsCount');
      const accX = document.getElementById('accX');
      const accY = document.getElementById('accY');
      const accZ = document.getElementById('accZ');
      const gyroAlpha = document.getElementById('gyroAlpha');
      const gyroBeta = document.getElementById('gyroBeta');
      const gyroGamma = document.getElementById('gyroGamma');
      const orientAlpha = document.getElementById('orientAlpha');
      const orientBeta = document.getElementById('orientBeta');
      const orientGamma = document.getElementById('orientGamma');
      const messageEl = document.getElementById('message');
      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const videoPreview = document.getElementById('videoPreview');
      const videoPlaceholder = document.getElementById('videoPlaceholder');
      const videoZoomWrap = document.getElementById('videoZoomWrap');
      const btnZoomOut = document.getElementById('btnZoomOut');
      const btnZoomIn = document.getElementById('btnZoomIn');
      const zoomSlider = document.getElementById('zoomSlider');
      const zoomValue = document.getElementById('zoomValue');
      const viFill = document.getElementById('viFill');
      const viValue = document.getElementById('viValue');
      const viFillTop = document.getElementById('viFillTop');
      const viValueTop = document.getElementById('viValueTop');
      const mapHint = document.getElementById('mapHint');
      const accPlot = document.getElementById('accPlot');
      const gyroPlot = document.getElementById('gyroPlot');
      const orientPlot = document.getElementById('orientPlot');
      const tagTrajectory = document.getElementById('tagTrajectory');
      const tagVideo = document.getElementById('tagVideo');
      const sensorVideoStage = document.getElementById('sensorVideoStage');
      const stepsCard = document.getElementById('stepsCard');
      const trajectoryCard = document.getElementById('trajectoryCard');
      const sensorCard = document.getElementById('sensorCard');
      const videoCard = document.getElementById('videoCard');

      let recording = false;
      let mediaStream = null;
      let videoTrack = null;
      let zoomCap = null;
      let stepCount = 0;
      let lastStepCountForTrajectory = 0;
      let viLevel = 0;

      // Trajectory state (computed from backend PDR pose updates)
      let trajectory = {
        path: [{ x: 0, y: 0 }],
        x: 0,
        y: 0,
        headingDeg: null
      };
      const trajectoryInfo = document.getElementById('trajectoryInfo');
      const mapContainer = document.getElementById('trajectoryMap');
      let mapOriginLat = 37.6213;
      let mapOriginLng = -122.3790;
      const METERS_PER_DEG_LAT = 111320;
      let map = null;
      let trajectoryPolyline = null;
      let trajectoryRawPolyline = null;
      let trajectorySegmentLayer = null;
      let baseTileLayer = null;
      let positionMarker = null;
      let originMarker = null;
      let dragStartLatLng = null;
      const btnResetAll = document.getElementById('btnResetAll');
      const btnResetTrajectory = document.getElementById('btnResetTrajectory');
      const btnIndoorCorrection = document.getElementById('btnIndoorCorrection');
      const distanceDisplay = document.getElementById('distanceDisplay');
      const tileProviders = [
        {
          name: 'OSM (代理)',
          url: '/api/tiles/{z}/{x}/{y}',
          options: {
            maxZoom: 20,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          }
        },
        {
          name: 'Esri World',
          url: 'https://{s}.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
          options: {
            subdomains: ['server', 'services'],
            maxZoom: 19,
            attribution: '&copy; Esri'
          }
        },
        {
          name: 'GeoQ 智图',
          url: 'https://map.geoq.cn/ArcGIS/rest/services/ChinaOnlineCommunity/MapServer/tile/{z}/{y}/{x}',
          options: {
            maxZoom: 18,
            attribution: '&copy; GeoQ 智图'
          }
        },
        {
          name: 'OpenStreetMap',
          url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
          options: {
            maxZoom: 20,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          }
        },
        {
          name: 'OpenStreetMap DE',
          url: 'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
          options: {
            maxZoom: 20,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
          }
        },
        {
          name: 'CARTO Light',
          url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
          options: {
            subdomains: 'abcd',
            maxZoom: 20,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; CARTO'
          }
        }
      ];
      const TILE_PROVIDER_CHINA = 0;
      const TILE_PROVIDER_OSM = 3;
      let activeTileProviderIndex = 0;
      let indoorCorrectionEnabled = false;
      const indoorCorrectionConfig = {
        turnThresholdDeg: 30,
        straightMinDistanceM: 10,
        turnWindowEdges: 2
      };

      let stepHistory = [];
      let totalDistanceM = 0;
      let headingFusedDeg = null;
      let lastOrientation = null;

      // Backend-driven PDR: algorithm lives server-side.
      let pdrSessionId = null;
      let pdrSocket = null;
      let pdrSocketOpen = false;
      let pdrReconnectScheduled = false;
      let lastPoseTimeMs = 0;
      let pdrWatchdogId = null;
      let mapMatchNotReadyWarned = false;

      function formatNum(n) {
        if (n == null || Number.isNaN(n)) return '—';
        return n.toFixed(2);
      }

      function setMessage(text, type) {
        messageEl.textContent = text || '';
        messageEl.className = 'message' + (type ? ' ' + type : '');
      }

      function updateIndoorCorrectionButton() {
        if (!btnIndoorCorrection) return;
        btnIndoorCorrection.classList.toggle('enabled', indoorCorrectionEnabled);
        btnIndoorCorrection.textContent = '室内环境修正: ' + (indoorCorrectionEnabled ? '开' : '关');
      }

      function setMapHintVisible(visible) {
        if (!mapHint) return;
        mapHint.style.display = visible ? 'block' : 'none';
      }

      function pointDistM(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function extractIndoorSegments(points) {
        if (!points || points.length < 2) return [];
        const edges = [];
        for (let i = 1; i < points.length; i++) {
          const a = points[i - 1];
          const b = points[i];
          const d = pointDistM(a, b);
          if (d < 0.02) continue;
          const h = Math.atan2(b.x - a.x, b.y - a.y) * 180 / Math.PI;
          edges.push({ startIdx: i - 1, endIdx: i, dist: d, heading: h });
        }
        if (!edges.length) return [];

        const turnEdgeSet = new Set();
        for (let i = 1; i < edges.length; i++) {
          const dHeading = Math.abs(angularDiffDeg(edges[i - 1].heading, edges[i].heading));
          if (dHeading >= indoorCorrectionConfig.turnThresholdDeg) {
            const s = Math.max(0, i - indoorCorrectionConfig.turnWindowEdges);
            const e = Math.min(edges.length - 1, i + indoorCorrectionConfig.turnWindowEdges);
            for (let k = s; k <= e; k++) turnEdgeSet.add(k);
          }
        }

        const segments = [];
        let runStart = 0;
        let runTurn = turnEdgeSet.has(0);
        for (let i = 1; i <= edges.length; i++) {
          const same = i < edges.length && turnEdgeSet.has(i) === runTurn;
          if (same) continue;
          const runEdges = edges.slice(runStart, i);
          const runStartIdx = runEdges[0].startIdx;
          const runEndIdx = runEdges[runEdges.length - 1].endIdx;
          const runDist = runEdges.reduce(function (s, e) { return s + e.dist; }, 0);
          let runPoints = points.slice(runStartIdx, runEndIdx + 1);
          if (!runTurn && runDist >= indoorCorrectionConfig.straightMinDistanceM && runPoints.length >= 2) {
            runPoints = [runPoints[0], runPoints[runPoints.length - 1]];
          }
          segments.push({
            type: runTurn ? 'turn' : 'straight',
            points: runPoints
          });
          runStart = i;
          runTurn = turnEdgeSet.has(i);
        }
        return segments.filter(function (seg) { return seg.points && seg.points.length >= 2; });
      }

      const plotMaxPoints = 120;
      const sensorPlots = {
        acc: {
          canvas: accPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        },
        gyro: {
          canvas: gyroPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        },
        orient: {
          canvas: orientPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        }
      };

      function resizePlotCanvas(plot) {
        if (!plot || !plot.canvas) return;
        const rect = plot.canvas.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const w = Math.max(120, Math.floor(rect.width * dpr));
        const h = Math.max(60, Math.floor(rect.height * dpr));
        if (plot.canvas.width !== w || plot.canvas.height !== h) {
          plot.canvas.width = w;
          plot.canvas.height = h;
        }
      }

      function drawPlot(plot) {
        if (!plot || !plot.canvas) return;
        resizePlotCanvas(plot);
        const ctx = plot.canvas.getContext('2d');
        const w = plot.canvas.width;
        const h = plot.canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#12121a';
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = '#2a2a32';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
          const gy = Math.round((h * i) / 4);
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(w, gy);
          ctx.stroke();
        }

        const all = plot.buffers[0].concat(plot.buffers[1], plot.buffers[2]).filter(function (v) { return Number.isFinite(v); });
        let maxAbs = 1;
        if (all.length) {
          const found = all.reduce(function (m, v) { return Math.max(m, Math.abs(v)); }, 0);
          maxAbs = Math.max(0.5, found);
        }
        const mid = h / 2;
        const usable = h * 0.42;

        plot.buffers.forEach(function (buf, idx) {
          if (buf.length < 2) return;
          ctx.strokeStyle = plot.colors[idx];
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < buf.length; i++) {
            const x = (i / (plotMaxPoints - 1)) * w;
            const y = mid - (buf[i] / maxAbs) * usable;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        });
      }

      function pushPlot(plot, v1, v2, v3) {
        if (!plot) return;
        const vals = [v1, v2, v3].map(function (v) { return Number.isFinite(v) ? v : 0; });
        vals.forEach(function (v, idx) {
          plot.buffers[idx].push(v);
          if (plot.buffers[idx].length > plotMaxPoints) plot.buffers[idx].shift();
        });
        drawPlot(plot);
      }

      function setFrontCard(panel) {
        if (!tagTrajectory || !tagVideo || !stepsCard || !trajectoryCard || !sensorCard || !videoCard) return;
        const active = panel === 'video' ? 'video' : 'trajectory';
        tagTrajectory.classList.toggle('active', active === 'trajectory');
        tagVideo.classList.toggle('active', active === 'video');
        tagTrajectory.setAttribute('aria-selected', active === 'trajectory' ? 'true' : 'false');
        tagVideo.setAttribute('aria-selected', active === 'video' ? 'true' : 'false');

        const showTrajectory = active === 'trajectory';
        const showVideo = active === 'video';
        stepsCard.style.display = showTrajectory ? '' : 'none';
        trajectoryCard.style.display = showTrajectory ? '' : 'none';
        videoCard.classList.toggle('is-hidden', !showVideo);
        sensorCard.classList.add('is-hidden');
        if (showTrajectory && map) {
          setTimeout(function () { map.invalidateSize(); }, 60);
        }
      }

      function updateStageHeight() {
        // Kept for compatibility with existing start/stop flow after moving to page tabs.
      }

      function getBackendBaseUrl() {
        if (window.PDR_BACKEND_URL) return String(window.PDR_BACKEND_URL).replace(/\/+$/, '');
        if (window.location.protocol.startsWith('http')) return window.location.origin.replace(/\/+$/, '');
        return 'http://127.0.0.1:8000';
      }

      function toWsUrl(httpBase, path) {
        const url = new URL(path, httpBase.endsWith('/') ? httpBase : httpBase + '/');
        url.protocol = url.protocol === 'https:' ? 'wss:' : 'ws:';
        return url.toString();
      }

      async function createPdrSession() {
        const resp = await fetch(getBackendBaseUrl() + '/api/session', { method: 'POST' });
        if (!resp.ok) throw new Error('后端会话创建失败：' + resp.status);
        const data = await resp.json();
        if (!data || !data.session_id) throw new Error('后端返回了无效会话');
        return data.session_id;
      }

      function closePdrSocket() {
        if (pdrSocket) {
          pdrSocketOpen = false;
          pdrSocket.close();
          pdrSocket = null;
        }
      }

      function applyBackendPose(pose) {
        if (!pose || pose.type !== 'pose_update') return;
        lastPoseTimeMs = Date.now();
        if (indoorCorrectionEnabled && pose.map_match_ready === false && !mapMatchNotReadyWarned) {
          setMessage('已开启室内修正，但后端未加载走廊图，当前仅使用PDR轨迹。', 'error');
          mapMatchNotReadyWarned = true;
        }
        const oldStepCount = stepCount;
        const oldDistanceM = totalDistanceM;
        const incomingStepCount = Number(pose.step_count || 0);
        const incomingDistanceM = Number(pose.distance_m || 0);
        const backendReset = incomingStepCount < stepCount;
        if (backendReset) {
          setMessage('连接已恢复，步数已从后端重新同步。', '');
          window.setTimeout(function () { setMessage('', ''); }, 3000);
        }
        stepCount = incomingStepCount;
        totalDistanceM = incomingDistanceM;
        headingFusedDeg = pose.heading_deg != null ? Number(pose.heading_deg) : null;
        trajectory.headingDeg = headingFusedDeg;
        if (pose.position && Number.isFinite(Number(pose.position.x)) && Number.isFinite(Number(pose.position.y))) {
          trajectory.x = Number(pose.position.x);
          trajectory.y = Number(pose.position.y);
        }
        if (backendReset) {
          trajectory.path = [{ x: 0, y: 0 }, { x: trajectory.x, y: trajectory.y }];
          stepHistory = [];
          lastStepCountForTrajectory = stepCount;
        }

        // Do not rely only on pose.stepped. On unstable networks, we may miss the
        // exact "stepped=true" frame while still receiving later frames with larger step_count.
        const gainedSteps = Math.max(0, stepCount - oldStepCount);
        if (gainedSteps > 0) {
          const distanceDelta = Math.max(0, totalDistanceM - oldDistanceM);
          const fallbackStepLen = gainedSteps > 0 ? (distanceDelta / gainedSteps) : Number(pose.step_length_m || 0);
          const stepLen = Number.isFinite(fallbackStepLen) ? fallbackStepLen : Number(pose.step_length_m || 0);
          const ts = Number(pose.t_ms || Date.now());
          for (let i = 0; i < gainedSteps; i++) {
            trajectory.path.push({ x: trajectory.x, y: trajectory.y });
            stepHistory.push({
              stepIndex: oldStepCount + i + 1,
              stepLengthM: stepLen,
              ts: ts
            });
          }
          lastStepCountForTrajectory = stepCount;
        }
        stepsEl.textContent = String(stepCount);
        try {
          drawTrajectory();
        } catch (err) {
          // Keep distance/step updates alive even if map rendering fails in bad networks.
          setMessage('地图渲染暂时异常，数据记录仍在继续。', 'error');
        }
        updateTrajectoryInfo();
      }

      async function connectPdrSocket(sessionId) {
        return await new Promise(function (resolve, reject) {
          const wsUrl = toWsUrl(getBackendBaseUrl(), '/ws/pdr/' + encodeURIComponent(sessionId));
          const socket = new WebSocket(wsUrl);
          const timeout = window.setTimeout(function () {
            socket.close();
            reject(new Error('后端 WebSocket 连接超时'));
          }, 8000);
          socket.onopen = function () {
            pdrSocket = socket;
            pdrSocketOpen = true;
            resolve();
          };
          socket.onmessage = function (evt) {
            let msg;
            try {
              msg = JSON.parse(evt.data);
            } catch (e) {
              return;
            }
            if (msg.type === 'pose_update') applyBackendPose(msg);
          };
          socket.onerror = function () {
            reject(new Error('后端 WebSocket 连接失败'));
          };
          socket.onclose = function () {
            pdrSocket = null;
            pdrSocketOpen = false;
            if (recording && pdrSessionId && !pdrReconnectScheduled) {
              pdrReconnectScheduled = true;
              setMessage('步态连接断开，正在重连…', 'error');
              window.setTimeout(function () {
                if (!recording || !pdrSessionId) { pdrReconnectScheduled = false; return; }
                connectPdrSocket(pdrSessionId).then(function () {
                  pdrReconnectScheduled = false;
                  setMessage('已重新连接。', 'success');
                  window.setTimeout(function () { setMessage('', ''); }, 2500);
                }).catch(function () {
                  pdrReconnectScheduled = false;
                  setMessage('重连失败，请保持本页在前台或停止后重试。', 'error');
                });
              }, 2500);
            }
          };
          socket.addEventListener('open', function () { window.clearTimeout(timeout); }, { once: true });
        });
      }

      function updateTrajectoryHeadingOnly() {
        const h = headingFusedDeg != null
          ? headingFusedDeg
          : (lastOrientation ? (lastOrientation.webkitCompassHeading != null ? lastOrientation.webkitCompassHeading : lastOrientation.alpha) : null);
        if (h != null) trajectory.headingDeg = h;
        drawTrajectory();
        updateTrajectoryInfo();
      }

      function updateTrajectoryInfo() {
        trajectoryInfo.textContent = '';
        if (distanceDisplay) distanceDisplay.textContent = totalDistanceM.toFixed(2);
      }

      function metersToLatLng(xM, yM) {
        const lat = mapOriginLat + (yM / METERS_PER_DEG_LAT);
        const lng = mapOriginLng + (xM / (METERS_PER_DEG_LAT * Math.cos(mapOriginLat * Math.PI / 180)));
        return [lat, lng];
      }

      function headingFromLatLng(a, b) {
        const avgLatRad = ((a.lat + b.lat) * 0.5) * Math.PI / 180;
        const dx = (b.lng - a.lng) * METERS_PER_DEG_LAT * Math.cos(avgLatRad);
        const dy = (b.lat - a.lat) * METERS_PER_DEG_LAT;
        if (Math.sqrt(dx * dx + dy * dy) < 0.3) return null;
        return normalizeAngle360((Math.atan2(dx, dy) * 180) / Math.PI);
      }

      function setMapOrigin(lat, lng) {
        mapOriginLat = lat;
        mapOriginLng = lng;
        if (originMarker) originMarker.setLatLng([lat, lng]);
        if (map && !recording) map.setView([lat, lng], map.getZoom());
        updateMapTrajectory();
      }

      function useApproxCurrentPosition() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function (pos) {
          const lat = pos && pos.coords ? pos.coords.latitude : null;
          const lng = pos && pos.coords ? pos.coords.longitude : null;
          if (lat == null || lng == null) return;
          setMapOrigin(lat, lng);
          if (!recording && map) map.setView([lat, lng], 20);
        }, function () {
          // Keep default origin if location is unavailable.
        }, { enableHighAccuracy: false, maximumAge: 30000, timeout: 5000 });
      }

      function detectChinaRegion() {
        return new Promise(function (resolve) {
          var xhr = new XMLHttpRequest();
          xhr.timeout = 3000;
          xhr.open('GET', 'https://ip-api.com/json/?fields=countryCode', true);
          xhr.onload = function () {
            try {
              var data = JSON.parse(xhr.responseText);
              resolve(data && data.countryCode === 'CN');
            } catch (e) {
              resolve(true);
            }
          };
          xhr.onerror = xhr.ontimeout = function () {
            resolve(true);
          };
          xhr.send();
        });
      }

      function initMap() {
        if (!mapContainer || map !== null) return;
        map = L.map('trajectoryMap', { zoomControl: true, attributionControl: false }).setView([mapOriginLat, mapOriginLng], 20);
        detectChinaRegion().then(function (isChina) {
          setBaseTileProvider(isChina ? TILE_PROVIDER_CHINA : TILE_PROVIDER_OSM);
        });
        originMarker = L.marker([mapOriginLat, mapOriginLng], {
          icon: L.divIcon({
            className: 'origin-marker-gate',
            html: '<div class="gate-marker-inner"></div>',
            iconSize: [28, 28],
            iconAnchor: [14, 14]
          })
        }).addTo(map).bindTooltip('登机口', { permanent: false, direction: 'top' });
        trajectoryPolyline = L.polyline([], { color: '#4a9eff', weight: 6, opacity: 0.95, dashArray: '10, 8' }).addTo(map);
        trajectoryRawPolyline = L.polyline([], { color: '#4a9eff', weight: 6, opacity: 0.95, dashArray: '10, 8' }).addTo(map);
        trajectorySegmentLayer = L.layerGroup().addTo(map);
        positionMarker = L.marker([mapOriginLat, mapOriginLng], {
          icon: L.divIcon({
            className: 'user-arrow-wrapper',
            html: '<div class="user-arrow-icon"></div>',
            iconSize: [24, 24],
            iconAnchor: [12, 12]
          }),
          keyboard: false,
          draggable: true
        }).addTo(map);
        positionMarker.on('dragstart', function () {
          const ll = positionMarker.getLatLng();
          dragStartLatLng = { lat: ll.lat, lng: ll.lng };
        });
        positionMarker.on('dragend', function () {
          if (recording) return;
          const ll = positionMarker.getLatLng();
          const dragHeading = dragStartLatLng ? headingFromLatLng(dragStartLatLng, { lat: ll.lat, lng: ll.lng }) : null;
          setMapOrigin(ll.lat, ll.lng);
          if (dragHeading != null) {
            trajectory.headingDeg = dragHeading;
            headingFusedDeg = dragHeading;
            updateUserArrowHeading();
            updateTrajectoryInfo();
          }
          setMessage('位置与朝向已根据用户箭头更新。', 'success');
          dragStartLatLng = null;
        });
        map.on('click', function (e) {
          if (recording) return;
          setMapOrigin(e.latlng.lat, e.latlng.lng);
          setMessage('位置已设置，准备好后点击开始。', 'success');
        });
        useApproxCurrentPosition();
      }

      function setBaseTileProvider(providerIndex) {
        if (!map) return;
        const idx = Math.max(0, Math.min(providerIndex, tileProviders.length - 1));
        const provider = tileProviders[idx];
        activeTileProviderIndex = idx;

        if (baseTileLayer) map.removeLayer(baseTileLayer);
        baseTileLayer = L.tileLayer(provider.url, provider.options);
        baseTileLayer.addTo(map);

        baseTileLayer.on('tileerror', function () {
          const nextIndex = activeTileProviderIndex + 1;
          if (nextIndex >= tileProviders.length) return;
          setBaseTileProvider(nextIndex);
          setMessage('当前网络地图加载不稳定，已切换到备用底图。', 'error');
        });
      }

      function updateUserArrowHeading() {
        if (!positionMarker) return;
        const el = positionMarker.getElement();
        if (!el) return;
        const arrow = el.querySelector('.user-arrow-icon');
        if (!arrow) return;
        const h = trajectory.headingDeg != null ? trajectory.headingDeg : 0;
        arrow.style.transform = 'rotate(' + h.toFixed(1) + 'deg)';
      }

      function updateMapTrajectory() {
        if (!map || !trajectoryPolyline || !positionMarker) return;
        const pts = trajectory.path;
        const latlngs = pts.map(function (p) { return metersToLatLng(p.x, p.y); });
        trajectoryPolyline.setLatLngs([]);
        if (indoorCorrectionEnabled) {
          trajectoryRawPolyline.setLatLngs([]);
          trajectorySegmentLayer.clearLayers();
          const correctedSegments = extractIndoorSegments(pts);
          correctedSegments.forEach(function (seg) {
            const segLatLngs = seg.points.map(function (p) { return metersToLatLng(p.x, p.y); });
            L.polyline(segLatLngs, {
              color: seg.type === 'turn' ? '#ff2d2d' : '#2d7fff',
              weight: 6,
              opacity: 0.95,
              dashArray: '10, 8'
            }).addTo(trajectorySegmentLayer);
          });
        } else {
          trajectorySegmentLayer.clearLayers();
          trajectoryRawPolyline.setLatLngs(latlngs);
        }
        const current = metersToLatLng(trajectory.x, trajectory.y);
        positionMarker.setLatLng(current);
        updateUserArrowHeading();
        if (latlngs.length >= 2) {
          const bounds = L.latLngBounds(latlngs);
          map.fitBounds(bounds.pad(0.08), { maxZoom: 21 });
        } else {
          map.setView([mapOriginLat, mapOriginLng], 20);
        }
      }

      function drawTrajectory() {
        if (map === null) initMap();
        updateMapTrajectory();
      }

      function resetAll() {
        indoorCorrectionEnabled = false;
        mapMatchNotReadyWarned = false;
        updateIndoorCorrectionButton();
        setMapHintVisible(true);
        stepCount = 0;
        lastStepCountForTrajectory = 0;
        viLevel = 0;
        trajectory = { path: [{ x: 0, y: 0 }], x: 0, y: 0, headingDeg: trajectory.headingDeg };
        stepHistory = [];
        totalDistanceM = 0;
        headingFusedDeg = null;
        stepsEl.textContent = '0';
        if (distanceDisplay) distanceDisplay.textContent = '0.00';
        if (viFill) viFill.style.width = '0%';
        if (viValue) viValue.textContent = '0';
        if (viFillTop) viFillTop.style.width = '0%';
        if (viValueTop) viValueTop.textContent = '0';
        drawTrajectory();
        updateTrajectoryInfo();
        if (pdrSocket && pdrSocketOpen) {
          pdrSocket.send(JSON.stringify({ type: 'reset', t_ms: Date.now() }));
        }
        setMessage('', '');
      }

      function normalizeAngle360(deg) {
        let d = deg % 360;
        if (d < 0) d += 360;
        return d;
      }

      function angularDiffDeg(fromDeg, toDeg) {
        let d = normalizeAngle360(toDeg) - normalizeAngle360(fromDeg);
        if (d > 180) d -= 360;
        if (d < -180) d += 360;
        return d;
      }

      function onMotion(e) {
        const acc = e.acceleration;
        if (acc) {
          accX.textContent = formatNum(acc.x);
          accY.textContent = formatNum(acc.y);
          accZ.textContent = formatNum(acc.z);
          const mag = Math.sqrt((acc.x || 0) * (acc.x || 0) + (acc.y || 0) * (acc.y || 0) + (acc.z || 0) * (acc.z || 0));
          const viRaw = Math.min(100, mag * 16);
          viLevel = viLevel * 0.78 + viRaw * 0.22;
          if (viFill) viFill.style.width = viLevel.toFixed(0) + '%';
          if (viValue) viValue.textContent = viLevel.toFixed(0);
          if (viFillTop) viFillTop.style.width = viLevel.toFixed(0) + '%';
          if (viValueTop) viValueTop.textContent = viLevel.toFixed(0);
          pushPlot(sensorPlots.acc, acc.x, acc.y, acc.z);
        }
        const rot = e.rotationRate;
        if (rot) {
          gyroAlpha.textContent = formatNum(rot.alpha);
          gyroBeta.textContent = formatNum(rot.beta);
          gyroGamma.textContent = formatNum(rot.gamma);
          pushPlot(sensorPlots.gyro, rot.alpha, rot.beta, rot.gamma);
        }
        if (pdrSocket && pdrSocketOpen) {
          const payload = {
            type: 'sensor_frame',
            t_ms: Date.now(),
            acc_including_g: e.accelerationIncludingGravity || { x: 0, y: 0, z: 0 },
            rotation_rate: rot ? { alpha: rot.alpha, beta: rot.beta, gamma: rot.gamma } : { alpha: null, beta: null, gamma: null },
            orientation: lastOrientation || {},
            map_match_enabled: indoorCorrectionEnabled
          };
          if (acc && Number.isFinite(acc.x) && Number.isFinite(acc.y) && Number.isFinite(acc.z)) {
            payload.acc_linear = { x: acc.x, y: acc.y, z: acc.z };
          }
          pdrSocket.send(JSON.stringify(payload));
        }
      }

      function onOrientation(e) {
        const compassHeading = (e.webkitCompassHeading != null && !Number.isNaN(e.webkitCompassHeading))
          ? normalizeAngle360(e.webkitCompassHeading)
          : (e.alpha != null && !Number.isNaN(e.alpha) ? normalizeAngle360(e.alpha) : null);
        lastOrientation = {
          alpha: e.alpha,
          beta: e.beta,
          gamma: e.gamma,
          absolute: e.absolute,
          webkitCompassHeading: e.webkitCompassHeading
        };
        orientAlpha.textContent = formatNum(compassHeading != null ? compassHeading : e.alpha);
        orientBeta.textContent = formatNum(e.beta);
        orientGamma.textContent = formatNum(e.gamma);
        pushPlot(sensorPlots.orient, compassHeading != null ? compassHeading : e.alpha, e.beta, e.gamma);
        updateTrajectoryHeadingOnly();
      }

      function startListeners() {
        window.addEventListener('devicemotion', onMotion, { passive: true });
        window.addEventListener('deviceorientation', onOrientation, { passive: true });
      }

      function stopListeners() {
        window.removeEventListener('devicemotion', onMotion);
        window.removeEventListener('deviceorientation', onOrientation);
      }

      async function requestPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
          try {
            const perm = await DeviceMotionEvent.requestPermission();
            if (perm !== 'granted') {
              setMessage('运动传感器权限被拒绝。', 'error');
              return false;
            }
          } catch (err) {
            setMessage('权限请求异常：' + err.message, 'error');
            return false;
          }
        }
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const perm = await DeviceOrientationEvent.requestPermission();
            if (perm !== 'granted') {
              setMessage('方向传感器权限被拒绝。', 'error');
              return false;
            }
          } catch (err) {
            setMessage('方向权限请求异常：' + err.message, 'error');
            return false;
          }
        }
        return true;
      }

      async function startRecording() {
        indoorCorrectionEnabled = false;
        mapMatchNotReadyWarned = false;
        updateIndoorCorrectionButton();
        setMapHintVisible(false);
        setMessage('正在请求传感器权限…', '');
        const ok = await requestPermission();
        if (!ok) return;

        try {
          pdrSessionId = await createPdrSession();
          await connectPdrSocket(pdrSessionId);
        } catch (err) {
          setMessage('PDR 后端不可用：' + err.message, 'error');
          return;
        }

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } },
            audio: false
          });
          videoPreview.srcObject = mediaStream;
          videoPlaceholder.style.display = 'none';
          videoPreview.style.display = 'block';

          videoTrack = mediaStream.getVideoTracks()[0] || null;
          zoomCap = null;
          if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
            const cap = videoTrack.getCapabilities();
            if (cap.zoom && (cap.zoom.min !== undefined || cap.zoom.max !== undefined)) {
              zoomCap = {
                min: cap.zoom.min != null ? cap.zoom.min : 1,
                max: cap.zoom.max != null ? cap.zoom.max : 4,
                step: cap.zoom.step != null ? cap.zoom.step : 0.1
              };
            }
          }
          if (zoomCap) {
            videoZoomWrap.classList.add('visible');
            zoomSlider.min = zoomCap.min;
            zoomSlider.max = zoomCap.max;
            zoomSlider.step = zoomCap.step;
            zoomSlider.value = zoomCap.min;
            zoomValue.textContent = zoomCap.min + '×';
            applyZoom(zoomCap.min);
          } else {
            videoZoomWrap.classList.remove('visible');
          }
          updateStageHeight();
        } catch (err) {
          setMessage('相机不可用：' + err.message + '。仍会继续记录 IMU。', 'error');
          if (mediaStream) {
            mediaStream.getTracks().forEach(function (t) { t.stop(); });
            mediaStream = null;
          }
        }

        stepCount = 0;
        lastStepCountForTrajectory = 0;
        viLevel = 0;
        trajectory = { path: [{ x: 0, y: 0 }], x: 0, y: 0, headingDeg: null };
        stepHistory = [];
        totalDistanceM = 0;
        headingFusedDeg = null;
        if (viFill) viFill.style.width = '0%';
        if (viValue) viValue.textContent = '0';
        if (viFillTop) viFillTop.style.width = '0%';
        if (viValueTop) viValueTop.textContent = '0';
        recording = true;
        startListeners();
        lastPoseTimeMs = 0;
        if (pdrWatchdogId) window.clearInterval(pdrWatchdogId);
        pdrWatchdogId = window.setInterval(function () {
          if (!recording || !pdrSessionId || lastPoseTimeMs === 0 || pdrReconnectScheduled) return;
          if (Date.now() - lastPoseTimeMs < 5000) return;
          pdrReconnectScheduled = true;
          setMessage('步态数据超时，正在重连…', 'error');
          connectPdrSocket(pdrSessionId).then(function () {
            pdrReconnectScheduled = false;
            setMessage('已重新连接。', 'success');
            window.setTimeout(function () { setMessage('', ''); }, 2500);
          }).catch(function () {
            pdrReconnectScheduled = false;
            setMessage('重连失败。', 'error');
          });
        }, 4000);
        statusEl.className = 'status recording';
        statusText.textContent = '记录中…';
        if (trajectoryCard) trajectoryCard.classList.add('recording');
        btnStart.disabled = true;
        btnStop.disabled = false;
        setMessage('', '');
      }

      function stopRecording() {
        recording = false;
        stopListeners();
        closePdrSocket();
        pdrSessionId = null;
        if (pdrWatchdogId) { window.clearInterval(pdrWatchdogId); pdrWatchdogId = null; }
        pdrReconnectScheduled = false;
        lastPoseTimeMs = 0;

        if (mediaStream) {
          mediaStream.getTracks().forEach(function (t) { t.stop(); });
          mediaStream = null;
          videoPreview.srcObject = null;
          videoPreview.style.display = 'none';
          videoPlaceholder.style.display = 'flex';
        }
        videoTrack = null;
        zoomCap = null;
        videoZoomWrap.classList.remove('visible');
        updateStageHeight();

        statusEl.className = 'status idle';
        statusText.textContent = '已停止';
        if (trajectoryCard) trajectoryCard.classList.remove('recording');
        btnStart.disabled = false;
        btnStop.disabled = true;
        setMessage('', '');
      }

      function applyZoom(value) {
        if (!videoTrack || !zoomCap) return;
        const num = Math.max(zoomCap.min, Math.min(zoomCap.max, Number(value)));
        videoTrack.applyConstraints({ zoom: num }).catch(function (err) {
          setMessage('缩放失败：' + err.message, 'error');
        });
        zoomSlider.value = num;
        zoomValue.textContent = Math.round(num * 10) / 10 + '×';
      }

      btnStart.addEventListener('click', startRecording);
      btnStop.addEventListener('click', stopRecording);
      btnResetAll.addEventListener('click', resetAll);
      btnResetTrajectory.addEventListener('click', resetAll);
      btnIndoorCorrection.addEventListener('click', function () {
        indoorCorrectionEnabled = !indoorCorrectionEnabled;
        if (indoorCorrectionEnabled) mapMatchNotReadyWarned = false;
        updateIndoorCorrectionButton();
        drawTrajectory();
      });

      btnZoomOut.addEventListener('click', function () {
        const v = Math.max(zoomCap ? zoomCap.min : 1, Number(zoomSlider.value) - (zoomCap ? zoomCap.step : 0.5));
        applyZoom(v);
      });
      btnZoomIn.addEventListener('click', function () {
        const v = Math.min(zoomCap ? zoomCap.max : 4, Number(zoomSlider.value) + (zoomCap ? zoomCap.step : 0.5));
        applyZoom(v);
      });
      zoomSlider.addEventListener('input', function () {
        applyZoom(zoomSlider.value);
      });
      tagTrajectory.addEventListener('click', function () { setFrontCard('trajectory'); });
      tagVideo.addEventListener('click', function () { setFrontCard('video'); });

      window.addEventListener('resize', function () {
        drawTrajectory();
        if (map) map.invalidateSize();
        drawPlot(sensorPlots.acc);
        drawPlot(sensorPlots.gyro);
        drawPlot(sensorPlots.orient);
      });
      if (mapContainer) initMap();
      drawTrajectory();
      setFrontCard('trajectory');
      setMapHintVisible(true);
      updateIndoorCorrectionButton();
      drawPlot(sensorPlots.acc);
      drawPlot(sensorPlots.gyro);
      drawPlot(sensorPlots.orient);

      if (!window.DeviceMotionEvent) {
        setMessage('当前设备或浏览器不支持运动传感器。', 'error');
        btnStart.disabled = true;
      }
    })();
  </script>
</body>
</html>
