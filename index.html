<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>机场旅客定位测试(国航内部预览版v0.9)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      --bg: #14090b;
      --surface: #221115;
      --border: #4a2429;
      --text: #f2ebe8;
      --muted: #b9a9a2;
      --accent: #c30f2f;
      --gold: #d4a34a;
      --success: #b58a34;
      --danger: #8f1010;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(circle at 18% 0%, rgba(212, 163, 74, 0.2), transparent 30%),
        radial-gradient(circle at 95% 8%, rgba(195, 15, 47, 0.35), transparent 40%),
        linear-gradient(180deg, #230b10 0%, #14090b 44%, #0d0809 100%);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      -webkit-tap-highlight-color: transparent;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1rem;
      padding-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: var(--gold);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.8rem 0.9rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
    }
    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin: 0 0 0.5rem;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0;
      font-size: 0.84rem;
    }
    .row .label { color: var(--muted); }
    .row .value {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
    }
    .steps-big {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent);
      text-align: right;
      line-height: 1.1;
      padding: 0;
    }
    .steps-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.35rem;
    }
    .steps-label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .steps-head-vi {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      min-width: 52%;
    }
    .steps-head-vi .vi-bar {
      flex: 1;
      margin-top: 0;
    }
    .steps-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.7rem;
      align-items: end;
      margin-bottom: 0.35rem;
    }
    .steps-box {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 0.5rem;
    }
    .steps-box .label {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .steps-distance {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
      font-size: 1.35rem;
      color: var(--text);
    }
    .vi-wrap {
      margin-top: 0.45rem;
    }
    .vi-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 0.22rem;
    }
    .vi-bar {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #12121a;
      overflow: hidden;
    }
    .vi-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), #d97f2b, var(--accent));
      transition: width 120ms linear;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.45rem;
      margin-top: 0.75rem;
    }
    .buttons > button:nth-child(1),
    .buttons > button:nth-child(2) {
      grid-column: span 3;
    }
    .buttons > button:nth-child(3),
    .buttons > button:nth-child(4),
    .buttons > button:nth-child(5) {
      grid-column: span 2;
    }
    button {
      padding: 0.62rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start {
      background: var(--accent);
      color: #fff;
    }
    .btn-stop {
      background: var(--danger);
      color: #fff;
    }
    .btn-download {
      background: var(--border);
      color: var(--text);
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      padding: 0.32rem 0.65rem;
      border-radius: 8px;
      margin-bottom: 0.7rem;
    }
    .status.idle { background: rgba(52, 199, 89, 0.18); color: #53d36b; }
    .status.recording { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
    .status.tab-status {
      margin: 0;
      border-radius: 999px;
      padding: 0.28rem 0.6rem;
      font-size: 0.72rem;
      line-height: 1;
      white-space: nowrap;
    }
    .trajectory-title-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    .trajectory-title-row h2 {
      margin: 0;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .status.recording .status-dot {
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .message {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .message.error { color: var(--danger); }
    .message.success { color: var(--success); }
    .trajectory-card {
      overflow: hidden;
    }
    .trajectory-map-wrap {
      position: relative;
      width: 100%;
      height: 390px;
      background: var(--bg);
      border-radius: 8px;
      margin-top: 0.35rem;
    }
    #trajectoryMap {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      z-index: 0;
    }
    .user-arrow-wrapper {
      background: transparent;
      border: none;
    }
    .user-arrow-icon {
      width: 0;
      height: 0;
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 18px solid #ff453a;
      transform-origin: 50% 66%;
      filter: drop-shadow(0 0 4px rgba(0, 0, 0, 0.5));
    }
    .trajectory-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.45rem;
      font-size: 0.74rem;
      color: var(--muted);
      gap: 0.5rem;
    }
    .trajectory-btn-group {
      display: inline-flex;
      gap: 0.35rem;
      align-items: center;
      flex-shrink: 0;
    }
    .btn-reset-all, .btn-reset-trajectory {
      padding: 0.45rem 0.55rem;
      font-size: 0.72rem;
      background: var(--border);
      color: var(--text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-indoor-correction {
      padding: 0.45rem 0.55rem;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
    }
    .btn-indoor-correction.enabled {
      border-color: #2f66d0;
      background: rgba(74, 158, 255, 0.2);
      color: #d7e8ff;
    }
    .btn-reset-all { padding: 0.62rem 0.65rem; font-size: 0.85rem; }
    .sensor-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.6rem;
    }
    .sensor-block {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.5rem;
      background: rgba(255, 255, 255, 0.01);
    }
    .sensor-title {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sensor-plot {
      width: 100%;
      height: 90px;
      background: #12121a;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: block;
    }
    .sensor-values {
      margin-top: 0.35rem;
      display: flex;
      gap: 0.5rem;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: ui-monospace, monospace;
    }
    .sensor-values .value {
      color: var(--text);
    }
    .sensor-video-switcher {
      margin-bottom: 0.75rem;
    }
    .switch-tags {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 0.5rem;
      padding: 0.22rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      width: 100%;
      align-items: center;
    }
    .switch-tag {
      padding: 0.28rem 0.72rem;
      font-size: 0.72rem;
      line-height: 1;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 600;
      border: none;
      flex: 1 1 0;
      text-align: center;
    }
    .switch-tag.active {
      color: #fff;
      background: linear-gradient(90deg, var(--accent), #8d1736);
    }
    .switch-tag.hidden {
      display: none;
    }
    .overlap-stage {
      position: static;
      min-height: 0;
      overflow: visible;
      height: auto !important;
    }
    .stack-card {
      position: static;
      top: auto;
      left: auto;
      width: 100%;
      margin: 0 0 0.75rem 0;
      transition: none;
      overflow: hidden;
      transform: none !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
    .stack-card.is-hidden {
      display: none;
    }
    @media (max-width: 420px) {
      .sensor-grid {
        grid-template-columns: 1fr;
      }
      .trajectory-map-wrap {
        height: 330px;
      }
      .stack-card {
        width: 96%;
      }
      .overlap-stage[data-active="sensors"] .video-stack-card {
        transform: translateX(calc(-50% + 12px)) scale(0.98);
      }
      .overlap-stage[data-active="video"] .sensor-stack-card {
        transform: translateX(calc(-50% - 12px)) scale(0.98);
      }
    }
    .video-preview-wrap {
      position: relative;
      width: 100%;
      height: 170px;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      margin-top: 0.5rem;
    }
    .video-preview-wrap video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-preview-wrap .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .video-zoom-controls {
      display: none;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.9rem;
    }
    .video-zoom-controls.visible {
      display: flex;
    }
    .video-zoom-controls button {
      padding: 0.4rem 0.75rem;
      font-size: 1rem;
      min-width: 2.5rem;
    }
    .video-zoom-controls input[type="range"] {
      flex: 1;
      min-width: 80px;
    }
    .video-zoom-controls .zoom-value {
      min-width: 2.5rem;
      text-align: center;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>机场旅客定位测试(国航内部预览版v0.9)</h1>

    <div class="sensor-video-switcher">
      <div class="switch-tags" role="tablist" aria-label="页面切换">
        <button type="button" id="tagTrajectory" class="switch-tag active" role="tab" aria-selected="true">轨迹</button>
        <button type="button" id="tagVideo" class="switch-tag" role="tab" aria-selected="false">视频</button>
        <button type="button" id="tagSensors" class="switch-tag" role="tab" aria-selected="false">传感器</button>
      </div>
    </div>

    <div id="stepsCard" class="card">
      <h2>步数 · 距离</h2>
      <div class="steps-header-row">
        <span class="steps-label">VI 强度</span>
        <div class="steps-head-vi">
          <div class="vi-bar"><div id="viFillTop" class="vi-fill"></div></div>
          <span id="viValueTop" style="font-size:0.78rem;color:var(--muted);min-width:1.2rem;text-align:right;">0</span>
        </div>
      </div>
      <div class="steps-summary">
        <div class="steps-box">
          <span class="label">步数</span>
          <div class="steps-big" id="stepsCount">0</div>
        </div>
        <div class="steps-box">
          <span class="label">距离 (m)</span>
          <span class="steps-distance" id="distanceDisplay">0.00</span>
        </div>
      </div>
    </div>

    <div id="trajectoryCard" class="card trajectory-card">
      <div class="trajectory-title-row">
        <h2>轨迹</h2>
        <div id="status" class="status tab-status idle">
          <span class="status-dot"></span>
          <span id="statusText">就绪</span>
        </div>
      </div>
      <p id="mapHint" class="message" style="margin-bottom:0.5rem">先点击用户箭头调整位置，再点击开始</p>
      <div class="trajectory-map-wrap">
        <div id="trajectoryMap"></div>
      </div>
      <div class="trajectory-actions">
        <span id="trajectoryInfo">东向: 0 m，北向: 0 m，航向: —°</span>
        <div class="trajectory-btn-group">
          <button type="button" id="btnIndoorCorrection" class="btn-indoor-correction">室内环境修正: 关</button>
          <button type="button" id="btnResetTrajectory" class="btn-reset-trajectory">重置</button>
        </div>
      </div>
    </div>

    <div class="sensor-video-switcher">
      <div id="sensorVideoStage" class="overlap-stage" data-active="sensors">
      <div id="sensorCard" class="card stack-card sensor-stack-card">
        <h2>传感器</h2>
        <div class="sensor-grid">
          <div class="sensor-block">
            <div class="sensor-title">加速度 (m/s²)</div>
            <canvas id="accPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>x: <span class="value" id="accX">—</span></span>
              <span>y: <span class="value" id="accY">—</span></span>
              <span>z: <span class="value" id="accZ">—</span></span>
            </div>
          </div>
          <div class="sensor-block">
            <div class="sensor-title">陀螺仪 (deg/s)</div>
            <canvas id="gyroPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>a: <span class="value" id="gyroAlpha">—</span></span>
              <span>b: <span class="value" id="gyroBeta">—</span></span>
              <span>g: <span class="value" id="gyroGamma">—</span></span>
            </div>
          </div>
          <div class="sensor-block">
            <div class="sensor-title">姿态 / 磁力计</div>
            <canvas id="orientPlot" class="sensor-plot"></canvas>
            <div class="sensor-values">
              <span>a: <span class="value" id="orientAlpha">—</span></span>
              <span>b: <span class="value" id="orientBeta">—</span></span>
              <span>g: <span class="value" id="orientGamma">—</span></span>
            </div>
          </div>
        </div>
      </div>
      <div id="videoCard" class="card stack-card video-stack-card">
        <h2>视频</h2>
        <p class="message" style="margin:0 0 0.5rem 0">记录 IMU 的同时录制视频，预览如下。</p>
        <div class="video-preview-wrap">
          <video id="videoPreview" playsinline muted autoplay style="display:none"></video>
          <div id="videoPlaceholder" class="video-placeholder">相机未开启。点击开始以录制视频 + IMU。</div>
        </div>
        <div id="videoZoomWrap" class="video-zoom-controls">
          <button type="button" id="btnZoomOut" aria-label="缩小">−</button>
          <input type="range" id="zoomSlider" min="1" max="4" step="0.1" value="1" aria-label="缩放">
          <span id="zoomValue" class="zoom-value">1×</span>
          <button type="button" id="btnZoomIn" aria-label="放大">+</button>
        </div>
      </div>
      </div>
    </div>

    <p id="message" class="message"></p>

    <div class="buttons">
      <button id="btnStart" class="btn-start">开始</button>
      <button id="btnStop" class="btn-stop" disabled>停止</button>
      <button id="btnResetAll" class="btn-reset-all">重置全部</button>
      <button id="btnDownload" class="btn-download" disabled>下载 JSON</button>
      <button id="btnDownloadVideo" class="btn-download" disabled title="停止一次包含相机的录制后可用">下载视频</button>
    </div>
  </div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('statusText');
      const stepsEl = document.getElementById('stepsCount');
      const accX = document.getElementById('accX');
      const accY = document.getElementById('accY');
      const accZ = document.getElementById('accZ');
      const gyroAlpha = document.getElementById('gyroAlpha');
      const gyroBeta = document.getElementById('gyroBeta');
      const gyroGamma = document.getElementById('gyroGamma');
      const orientAlpha = document.getElementById('orientAlpha');
      const orientBeta = document.getElementById('orientBeta');
      const orientGamma = document.getElementById('orientGamma');
      const messageEl = document.getElementById('message');
      const btnStart = document.getElementById('btnStart');
      const btnStop = document.getElementById('btnStop');
      const btnDownload = document.getElementById('btnDownload');
      const btnDownloadVideo = document.getElementById('btnDownloadVideo');
      const videoPreview = document.getElementById('videoPreview');
      const videoPlaceholder = document.getElementById('videoPlaceholder');
      const videoZoomWrap = document.getElementById('videoZoomWrap');
      const btnZoomOut = document.getElementById('btnZoomOut');
      const btnZoomIn = document.getElementById('btnZoomIn');
      const zoomSlider = document.getElementById('zoomSlider');
      const zoomValue = document.getElementById('zoomValue');
      const viFill = document.getElementById('viFill');
      const viValue = document.getElementById('viValue');
      const viFillTop = document.getElementById('viFillTop');
      const viValueTop = document.getElementById('viValueTop');
      const mapHint = document.getElementById('mapHint');
      const accPlot = document.getElementById('accPlot');
      const gyroPlot = document.getElementById('gyroPlot');
      const orientPlot = document.getElementById('orientPlot');
      const tagTrajectory = document.getElementById('tagTrajectory');
      const tagSensors = document.getElementById('tagSensors');
      const tagVideo = document.getElementById('tagVideo');
      const sensorVideoStage = document.getElementById('sensorVideoStage');
      const stepsCard = document.getElementById('stepsCard');
      const trajectoryCard = document.getElementById('trajectoryCard');
      const sensorCard = document.getElementById('sensorCard');
      const videoCard = document.getElementById('videoCard');

      let recording = false;
      let mediaStream = null;
      let mediaRecorder = null;
      let recordedVideoChunks = [];
      let recordedVideoBlob = null;
      let videoTrack = null;
      let zoomCap = null;
      let recordBuffer = [];
      let stepCount = 0;
      let lastStepCountForTrajectory = 0;
      let viLevel = 0;

      // Trajectory state (PDR Phase 1: Weinberg step length + fused heading)
      let trajectory = {
        path: [{ x: 0, y: 0 }],
        x: 0,
        y: 0,
        headingDeg: null
      };
      const trajectoryInfo = document.getElementById('trajectoryInfo');
      const mapContainer = document.getElementById('trajectoryMap');
      let mapOriginLat = 37.6213;
      let mapOriginLng = -122.3790;
      const METERS_PER_DEG_LAT = 111320;
      let map = null;
      let trajectoryPolyline = null;
      let trajectoryRawPolyline = null;
      let trajectorySegmentLayer = null;
      let positionMarker = null;
      let originMarker = null;
      let dragStartLatLng = null;
      const btnResetAll = document.getElementById('btnResetAll');
      const btnResetTrajectory = document.getElementById('btnResetTrajectory');
      const btnIndoorCorrection = document.getElementById('btnIndoorCorrection');
      const distanceDisplay = document.getElementById('distanceDisplay');
      let indoorCorrectionEnabled = false;
      const indoorCorrectionConfig = {
        turnThresholdDeg: 30,
        straightMinDistanceM: 10,
        turnWindowEdges: 2
      };

      // Weinberg: step_length = K_weinberg * (a_max - a_min)^0.25
      let K_weinberg = 0.5;
      let stepHistory = [];
      let totalDistanceM = 0;

      // Heading fusion: 1D Kalman filter for heading + gyro bias.
      const headingFilterConfig = {
        initWindowMs: 1500,
        minInitSamples: 8,
        processNoiseHeadingDeg2PerSec: 4,
        processNoiseBiasDeg2PerSec: 0.02,
        measNoiseStableDeg2: 16,
        measNoiseDisturbedDeg2: 144,
        magJumpThresholdDeg: 25
      };
      let headingGyroDeg = 0;
      let lastGyroTime = null;
      let headingFusedDeg = null;
      let lastMagHeadingDeg = null;
      let headingStateDeg = 0;
      let headingBiasDegPerSec = 0;
      let headingCov = { p00: 400, p01: 0, p10: 0, p11: 25 };
      let headingInitialized = false;
      let headingInitStartMs = null;
      let initialHeadingSamples = [];
      // Gyro alpha sign: 1 = W3C (positive = turn right). Use -1 if when you turn LEFT the trajectory turns RIGHT (e.g. some iOS).
      const GYRO_ALPHA_SIGN = -1;
      let driftWarningCount = 0;
      const DRIFT_THRESHOLD_DEG = 35;
      const DRIFT_WARN_SAMPLES = 40;

      // --- Step detection config ---
      // Band-pass keeps 0.5–3 Hz (walking); adaptive threshold and valley/prominence reduce false steps from shake.
      const stepConfig = {
        minPeriodMs: 350,           // Minimum time between two consecutive steps (ms); rejects very fast double peaks.
        adaptiveWindowMs: 2000,     // Window length for computing mean μ and std σ of the filtered signal.
        adaptiveK: 0.5,             // Threshold = μ + k*σ; higher k = stricter (fewer false steps, may miss weak steps).
        bandpassLowHz: 0.5,         // High-pass cutoff (Hz); removes drift and DC.
        bandpassHighHz: 3,          // Low-pass cutoff (Hz); removes high-frequency noise.
        defaultThreshold: 0.5,      // Threshold used until we have enough samples in the window.
        minSamplesForThreshold: 20,  // Minimum samples in window before using adaptive threshold instead of default.
        minProminence: 0.35,        // Minimum (peak − valley) in m/s² to count a step; filters small shake oscillations.
        valleyBelowMu: true        // If true, require signal to drop below mean before next step (anti-shake).
      };
      // Step detection state (reset on Reset / Start)
      let lastStepTime = 0;              // Timestamp of last accepted step (for min period check).
      let lastStepDetectTime = null;      // Timestamp of previous sample (for dt in band-pass).
      let bpHpPrev = 0;                  // Previous high-pass output.
      let bpLpPrev = 0;                  // Previous low-pass output.
      let lastMagRaw = null;              // Previous raw magnitude (for high-pass delta).
      let magBuffer = [];                 // Rolling { t, v } of band-pass output for adaptive threshold (2 s).
      let magPrev2 = null;                // Band-pass value at sample i-2 (for local max: need v[i-2] < v[i-1] > v[i]).
      let magPrev1 = null;                // Band-pass value at sample i-1.
      let minSinceLastStep = Infinity;    // Minimum band-pass value since last step (valley for prominence).
      let hadValleySinceLastStep = true;  // True after signal drops below mean; false right after a step (anti-shake).

      function formatNum(n) {
        if (n == null || Number.isNaN(n)) return '—';
        return n.toFixed(2);
      }

      function setMessage(text, type) {
        messageEl.textContent = text || '';
        messageEl.className = 'message' + (type ? ' ' + type : '');
      }

      function updateIndoorCorrectionButton() {
        if (!btnIndoorCorrection) return;
        btnIndoorCorrection.classList.toggle('enabled', indoorCorrectionEnabled);
        btnIndoorCorrection.textContent = '室内环境修正: ' + (indoorCorrectionEnabled ? '开' : '关');
      }

      function setMapHintVisible(visible) {
        if (!mapHint) return;
        mapHint.style.display = visible ? 'block' : 'none';
      }

      function pointDistM(a, b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        return Math.sqrt(dx * dx + dy * dy);
      }

      function extractIndoorSegments(points) {
        if (!points || points.length < 2) return [];
        const edges = [];
        for (let i = 1; i < points.length; i++) {
          const a = points[i - 1];
          const b = points[i];
          const d = pointDistM(a, b);
          if (d < 0.02) continue;
          const h = Math.atan2(b.x - a.x, b.y - a.y) * 180 / Math.PI;
          edges.push({ startIdx: i - 1, endIdx: i, dist: d, heading: h });
        }
        if (!edges.length) return [];

        const turnEdgeSet = new Set();
        for (let i = 1; i < edges.length; i++) {
          const dHeading = Math.abs(angularDiffDeg(edges[i - 1].heading, edges[i].heading));
          if (dHeading >= indoorCorrectionConfig.turnThresholdDeg) {
            const s = Math.max(0, i - indoorCorrectionConfig.turnWindowEdges);
            const e = Math.min(edges.length - 1, i + indoorCorrectionConfig.turnWindowEdges);
            for (let k = s; k <= e; k++) turnEdgeSet.add(k);
          }
        }

        const segments = [];
        let runStart = 0;
        let runTurn = turnEdgeSet.has(0);
        for (let i = 1; i <= edges.length; i++) {
          const same = i < edges.length && turnEdgeSet.has(i) === runTurn;
          if (same) continue;
          const runEdges = edges.slice(runStart, i);
          const runStartIdx = runEdges[0].startIdx;
          const runEndIdx = runEdges[runEdges.length - 1].endIdx;
          const runDist = runEdges.reduce(function (s, e) { return s + e.dist; }, 0);
          let runPoints = points.slice(runStartIdx, runEndIdx + 1);
          if (!runTurn && runDist >= indoorCorrectionConfig.straightMinDistanceM && runPoints.length >= 2) {
            runPoints = [runPoints[0], runPoints[runPoints.length - 1]];
          }
          segments.push({
            type: runTurn ? 'turn' : 'straight',
            points: runPoints
          });
          runStart = i;
          runTurn = turnEdgeSet.has(i);
        }
        return segments.filter(function (seg) { return seg.points && seg.points.length >= 2; });
      }

      const plotMaxPoints = 120;
      const sensorPlots = {
        acc: {
          canvas: accPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        },
        gyro: {
          canvas: gyroPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        },
        orient: {
          canvas: orientPlot,
          buffers: [[], [], []],
          colors: ['#4a9eff', '#34c759', '#ff9f0a']
        }
      };

      function resizePlotCanvas(plot) {
        if (!plot || !plot.canvas) return;
        const rect = plot.canvas.getBoundingClientRect();
        const dpr = Math.max(1, window.devicePixelRatio || 1);
        const w = Math.max(120, Math.floor(rect.width * dpr));
        const h = Math.max(60, Math.floor(rect.height * dpr));
        if (plot.canvas.width !== w || plot.canvas.height !== h) {
          plot.canvas.width = w;
          plot.canvas.height = h;
        }
      }

      function drawPlot(plot) {
        if (!plot || !plot.canvas) return;
        resizePlotCanvas(plot);
        const ctx = plot.canvas.getContext('2d');
        const w = plot.canvas.width;
        const h = plot.canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#12121a';
        ctx.fillRect(0, 0, w, h);

        ctx.strokeStyle = '#2a2a32';
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
          const gy = Math.round((h * i) / 4);
          ctx.beginPath();
          ctx.moveTo(0, gy);
          ctx.lineTo(w, gy);
          ctx.stroke();
        }

        const all = plot.buffers[0].concat(plot.buffers[1], plot.buffers[2]).filter(function (v) { return Number.isFinite(v); });
        let maxAbs = 1;
        if (all.length) {
          const found = all.reduce(function (m, v) { return Math.max(m, Math.abs(v)); }, 0);
          maxAbs = Math.max(0.5, found);
        }
        const mid = h / 2;
        const usable = h * 0.42;

        plot.buffers.forEach(function (buf, idx) {
          if (buf.length < 2) return;
          ctx.strokeStyle = plot.colors[idx];
          ctx.lineWidth = 2;
          ctx.beginPath();
          for (let i = 0; i < buf.length; i++) {
            const x = (i / (plotMaxPoints - 1)) * w;
            const y = mid - (buf[i] / maxAbs) * usable;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        });
      }

      function pushPlot(plot, v1, v2, v3) {
        if (!plot) return;
        const vals = [v1, v2, v3].map(function (v) { return Number.isFinite(v) ? v : 0; });
        vals.forEach(function (v, idx) {
          plot.buffers[idx].push(v);
          if (plot.buffers[idx].length > plotMaxPoints) plot.buffers[idx].shift();
        });
        drawPlot(plot);
      }

      function setFrontCard(panel) {
        if (!tagTrajectory || !tagVideo || !tagSensors || !stepsCard || !trajectoryCard || !sensorCard || !videoCard) return;
        const active = panel === 'video' ? 'video' : (panel === 'sensors' ? 'sensors' : 'trajectory');
        tagTrajectory.classList.toggle('active', active === 'trajectory');
        tagVideo.classList.toggle('active', active === 'video');
        tagSensors.classList.toggle('active', active === 'sensors');
        tagTrajectory.setAttribute('aria-selected', active === 'trajectory' ? 'true' : 'false');
        tagVideo.setAttribute('aria-selected', active === 'video' ? 'true' : 'false');
        tagSensors.setAttribute('aria-selected', active === 'sensors' ? 'true' : 'false');

        const showTrajectory = active === 'trajectory';
        const showVideo = active === 'video';
        const showSensors = active === 'sensors';
        stepsCard.style.display = showTrajectory ? '' : 'none';
        trajectoryCard.style.display = showTrajectory ? '' : 'none';
        videoCard.classList.toggle('is-hidden', !showVideo);
        sensorCard.classList.toggle('is-hidden', !showSensors);
        if (showTrajectory && map) {
          setTimeout(function () { map.invalidateSize(); }, 60);
        }
      }

      function updateStageHeight() {
        // Kept for compatibility with existing start/stop flow after moving to page tabs.
      }

      /**
       * Step detection from linear acceleration (gravity already removed).
       * Pipeline: orientation-invariant magnitude → band-pass (0.5–3 Hz) → adaptive threshold T=μ+kσ →
       * peak detection (local max + prominence + valley-between-steps) → Weinberg step length.
       * @param {Object} acc - { x, y, z } linear acceleration in m/s² (e.g. from DeviceMotionEvent.acceleration or accG − gravity).
       * @param {number} [timeMs] - Timestamp in ms (e.g. Date.now()); used for dt and 2s window.
       */
      function stepDetect(acc, timeMs) {
        if (!acc || acc.x == null) return;
        const now = timeMs != null ? timeMs : Date.now();

        // 1) Orientation-invariant magnitude (same in pocket, hand, or tilted)
        const mag = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);

        // 2) Time step for filter (cap to avoid big gaps)
        const dtSec = lastStepDetectTime != null
          ? Math.min((now - lastStepDetectTime) / 1000, 0.1)
          : 0.02;
        lastStepDetectTime = now;

        // 3) Band-pass: high-pass at bandpassLowHz, then low-pass at bandpassHighHz (one-pole IIR)
        const tauHp = 1 / (2 * Math.PI * stepConfig.bandpassLowHz);
        const tauLp = 1 / (2 * Math.PI * stepConfig.bandpassHighHz);
        const alphaHp = tauHp / (tauHp + dtSec);
        const alphaLp = Math.exp(-dtSec / tauLp);
        const lastRaw = lastMagRaw != null ? lastMagRaw : mag;
        const hpOut = alphaHp * (bpHpPrev + mag - lastRaw);
        const lpOut = alphaLp * bpLpPrev + (1 - alphaLp) * hpOut;
        bpHpPrev = hpOut;
        bpLpPrev = lpOut;
        lastMagRaw = mag;

        // 4) Rolling buffer for adaptive threshold (drop older than adaptiveWindowMs)
        magBuffer.push({ t: now, v: lpOut });
        const cutoff = now - stepConfig.adaptiveWindowMs;
        while (magBuffer.length > 0 && magBuffer[0].t < cutoff) magBuffer.shift();

        minSinceLastStep = Math.min(minSinceLastStep, lpOut);

        // 5) Adaptive threshold T = μ + k*σ (over last 2 s); floor 0.15 so weak signals can still trigger
        let threshold = stepConfig.defaultThreshold;
        let mu = 0;
        if (magBuffer.length >= stepConfig.minSamplesForThreshold) {
          const vals = magBuffer.map(function (e) { return e.v; });
          mu = vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;
          const variance = vals.reduce(function (s, v) { return s + (v - mu) * (v - mu); }, 0) / vals.length;
          const sigma = Math.sqrt(Math.max(0, variance));
          threshold = Math.max(mu + stepConfig.adaptiveK * sigma, 0.15);
        }
        // Mark that we've seen a valley (signal below mean) so next peak can count as step (anti-shake)
        if (stepConfig.valleyBelowMu && magBuffer.length >= stepConfig.minSamplesForThreshold && lpOut < mu) {
          hadValleySinceLastStep = true;
        }

        // 6) Peak check: previous sample (magPrev1) is a local maximum and passes all guards
        if (magPrev2 != null) {
          const isLocalMax = magPrev2 < magPrev1 && magPrev1 > lpOut;
          const aboveThreshold = magPrev1 > threshold;
          const minPeriodOk = (now - lastStepTime) >= stepConfig.minPeriodMs;
          const a_max = magPrev1;
          const a_min = minSinceLastStep;
          const prominence = a_max - a_min;
          const minProminenceOk = prominence >= stepConfig.minProminence;

          if (isLocalMax && aboveThreshold && minPeriodOk && minProminenceOk && hadValleySinceLastStep) {
            const stepLengthM = K_weinberg * Math.pow(Math.max(0.01, prominence), 0.25);
            stepHistory.push({
              stepIndex: stepCount + 1,
              a_max: a_max,
              a_min: a_min,
              stepLengthM: stepLengthM,
              ts: now
            });
            totalDistanceM += stepLengthM;
            stepCount++;
            lastStepTime = now;
            minSinceLastStep = Infinity;
            hadValleySinceLastStep = false;
          }
        }

        // 7) Shift history for next sample (must be after peak check so magPrev1 is still previous value)
        magPrev2 = magPrev1;
        magPrev1 = lpOut;
      }

      function updateTrajectory() {
        if (stepCount <= lastStepCountForTrajectory) return;
        const newSteps = stepCount - lastStepCountForTrajectory;
        const fallbackHeading = lastOrientation
          ? (lastOrientation.webkitCompassHeading != null ? lastOrientation.webkitCompassHeading : lastOrientation.alpha)
          : 0;
        const headingDeg = (headingFusedDeg != null ? headingFusedDeg : fallbackHeading);
        trajectory.headingDeg = headingDeg;
        const rad = (headingDeg * Math.PI) / 180;
        // Step in heading direction: 0° = North (+y), 90° = East (+x). Turn left → heading decreases → trajectory goes left on map.
        for (let i = 0; i < newSteps; i++) {
          const idx = lastStepCountForTrajectory + i;
          const stepLen = (idx < stepHistory.length && stepHistory[idx]) ? stepHistory[idx].stepLengthM : 0.7;
          trajectory.x += stepLen * Math.sin(rad);
          trajectory.y += stepLen * Math.cos(rad);
          trajectory.path.push({ x: trajectory.x, y: trajectory.y });
        }
        lastStepCountForTrajectory = stepCount;
        drawTrajectory();
        updateTrajectoryInfo();
        if (distanceDisplay) distanceDisplay.textContent = totalDistanceM.toFixed(2);
      }

      function updateTrajectoryHeadingOnly() {
        const h = headingFusedDeg != null
          ? headingFusedDeg
          : (lastOrientation ? (lastOrientation.webkitCompassHeading != null ? lastOrientation.webkitCompassHeading : lastOrientation.alpha) : null);
        if (h != null) trajectory.headingDeg = h;
        drawTrajectory();
        updateTrajectoryInfo();
      }

      function updateTrajectoryInfo() {
        const h = trajectory.headingDeg != null ? trajectory.headingDeg.toFixed(0) : '—';
        trajectoryInfo.textContent = '东向: ' + trajectory.x.toFixed(2) + ' m，北向: ' + trajectory.y.toFixed(2) + ' m，航向: ' + h + '°';
        if (distanceDisplay) distanceDisplay.textContent = totalDistanceM.toFixed(2);
      }

      function metersToLatLng(xM, yM) {
        const lat = mapOriginLat + (yM / METERS_PER_DEG_LAT);
        const lng = mapOriginLng + (xM / (METERS_PER_DEG_LAT * Math.cos(mapOriginLat * Math.PI / 180)));
        return [lat, lng];
      }

      function headingFromLatLng(a, b) {
        const avgLatRad = ((a.lat + b.lat) * 0.5) * Math.PI / 180;
        const dx = (b.lng - a.lng) * METERS_PER_DEG_LAT * Math.cos(avgLatRad);
        const dy = (b.lat - a.lat) * METERS_PER_DEG_LAT;
        if (Math.sqrt(dx * dx + dy * dy) < 0.3) return null;
        return normalizeAngle360((Math.atan2(dx, dy) * 180) / Math.PI);
      }

      function setMapOrigin(lat, lng) {
        mapOriginLat = lat;
        mapOriginLng = lng;
        if (originMarker) originMarker.setLatLng([lat, lng]);
        if (map && !recording) map.setView([lat, lng], map.getZoom());
        updateMapTrajectory();
      }

      function useApproxCurrentPosition() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(function (pos) {
          const lat = pos && pos.coords ? pos.coords.latitude : null;
          const lng = pos && pos.coords ? pos.coords.longitude : null;
          if (lat == null || lng == null) return;
          setMapOrigin(lat, lng);
          if (!recording && map) map.setView([lat, lng], 20);
        }, function () {
          // Keep default origin if location is unavailable.
        }, { enableHighAccuracy: false, maximumAge: 30000, timeout: 5000 });
      }

      function initMap() {
        if (!mapContainer || map !== null) return;
        map = L.map('trajectoryMap', { zoomControl: true }).setView([mapOriginLat, mapOriginLng], 20);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        originMarker = L.circleMarker([mapOriginLat, mapOriginLng], {
          radius: 10,
          fillColor: '#34c759',
          color: '#e8e8ec',
          weight: 2,
          fillOpacity: 0.9
        }).addTo(map).bindTooltip('当前位置', { permanent: false, direction: 'top' });
        trajectoryPolyline = L.polyline([], { color: '#4a9eff', weight: 4, opacity: 0.9 }).addTo(map);
        trajectoryRawPolyline = L.polyline([], { color: '#4a9eff', weight: 4, opacity: 0.95 }).addTo(map);
        trajectorySegmentLayer = L.layerGroup().addTo(map);
        positionMarker = L.marker([mapOriginLat, mapOriginLng], {
          icon: L.divIcon({
            className: 'user-arrow-wrapper',
            html: '<div class="user-arrow-icon"></div>',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          }),
          keyboard: false,
          draggable: true
        }).addTo(map);
        positionMarker.on('dragstart', function () {
          const ll = positionMarker.getLatLng();
          dragStartLatLng = { lat: ll.lat, lng: ll.lng };
        });
        positionMarker.on('dragend', function () {
          if (recording) return;
          const ll = positionMarker.getLatLng();
          const dragHeading = dragStartLatLng ? headingFromLatLng(dragStartLatLng, { lat: ll.lat, lng: ll.lng }) : null;
          setMapOrigin(ll.lat, ll.lng);
          if (dragHeading != null) {
            trajectory.headingDeg = dragHeading;
            headingStateDeg = dragHeading;
            headingFusedDeg = dragHeading;
            headingInitialized = true;
            updateUserArrowHeading();
            updateTrajectoryInfo();
          }
          setMessage('位置与朝向已根据用户箭头更新。', 'success');
          dragStartLatLng = null;
        });
        map.on('click', function (e) {
          if (recording) return;
          setMapOrigin(e.latlng.lat, e.latlng.lng);
          setMessage('位置已设置，准备好后点击开始。', 'success');
        });
        useApproxCurrentPosition();
      }

      function updateUserArrowHeading() {
        if (!positionMarker) return;
        const el = positionMarker.getElement();
        if (!el) return;
        const arrow = el.querySelector('.user-arrow-icon');
        if (!arrow) return;
        const h = trajectory.headingDeg != null ? trajectory.headingDeg : 0;
        arrow.style.transform = 'rotate(' + h.toFixed(1) + 'deg)';
      }

      function updateMapTrajectory() {
        if (!map || !trajectoryPolyline || !positionMarker) return;
        const pts = trajectory.path;
        const latlngs = pts.map(function (p) { return metersToLatLng(p.x, p.y); });
        trajectoryPolyline.setLatLngs([]);
        if (indoorCorrectionEnabled) {
          trajectoryRawPolyline.setLatLngs([]);
          trajectorySegmentLayer.clearLayers();
          const correctedSegments = extractIndoorSegments(pts);
          correctedSegments.forEach(function (seg) {
            const segLatLngs = seg.points.map(function (p) { return metersToLatLng(p.x, p.y); });
            L.polyline(segLatLngs, {
              color: seg.type === 'turn' ? '#ff2d2d' : '#2d7fff',
              weight: 4,
              opacity: 0.95
            }).addTo(trajectorySegmentLayer);
          });
        } else {
          trajectorySegmentLayer.clearLayers();
          trajectoryRawPolyline.setLatLngs(latlngs);
        }
        const current = metersToLatLng(trajectory.x, trajectory.y);
        positionMarker.setLatLng(current);
        updateUserArrowHeading();
        if (latlngs.length >= 2) {
          const bounds = L.latLngBounds(latlngs);
          map.fitBounds(bounds.pad(0.08), { maxZoom: 21 });
        } else {
          map.setView([mapOriginLat, mapOriginLng], 20);
        }
      }

      function drawTrajectory() {
        if (map === null) initMap();
        updateMapTrajectory();
      }

      function resetAll() {
        indoorCorrectionEnabled = false;
        updateIndoorCorrectionButton();
        setMapHintVisible(true);
        stepCount = 0;
        lastStepCountForTrajectory = 0;
        viLevel = 0;
        trajectory = { path: [{ x: 0, y: 0 }], x: 0, y: 0, headingDeg: trajectory.headingDeg };
        recordBuffer = [];
        stepHistory = [];
        totalDistanceM = 0;
        lastStepTime = 0;
        lastStepDetectTime = null;
        bpHpPrev = 0;
        bpLpPrev = 0;
        lastMagRaw = null;
        magBuffer = [];
        magPrev2 = null;
        magPrev1 = null;
        minSinceLastStep = Infinity;
        hadValleySinceLastStep = true;
        resetHeadingFilter();
        stepsEl.textContent = '0';
        if (distanceDisplay) distanceDisplay.textContent = '0.00';
        if (viFill) viFill.style.width = '0%';
        if (viValue) viValue.textContent = '0';
        if (viFillTop) viFillTop.style.width = '0%';
        if (viValueTop) viValueTop.textContent = '0';
        drawTrajectory();
        updateTrajectoryInfo();
        setMessage('已重置到初始状态。', '');
      }

      function pushSample(motion, orientation) {
        if (!recording) return;
        const t = performance.now();
        const ts = new Date().toISOString();
        const acc = motion.acceleration || motion.accelerationIncludingGravity;
        const accG = motion.accelerationIncludingGravity;
        const rot = motion.rotationRate || {};
        recordBuffer.push({
          ts,
          t,
          acceleration: acc ? { x: acc.x, y: acc.y, z: acc.z } : null,
          accelerationIncludingGravity: accG ? { x: accG.x, y: accG.y, z: accG.z } : null,
          rotationRate: { alpha: rot.alpha, beta: rot.beta, gamma: rot.gamma },
          orientation: orientation ? {
            alpha: orientation.alpha,
            beta: orientation.beta,
            gamma: orientation.gamma,
            absolute: orientation.absolute,
            webkitCompassHeading: orientation.webkitCompassHeading
          } : null,
          steps: stepCount,
          position: { x: trajectory.x, y: trajectory.y },
          heading_fused: headingFusedDeg
        });
      }

      let lastOrientation = null;

      function normalizeAngle360(deg) {
        let d = deg % 360;
        if (d < 0) d += 360;
        return d;
      }

      function angularDiffDeg(fromDeg, toDeg) {
        let d = normalizeAngle360(toDeg) - normalizeAngle360(fromDeg);
        if (d > 180) d -= 360;
        if (d < -180) d += 360;
        return d;
      }

      function circularMeanDeg(values) {
        if (!values.length) return null;
        let sinSum = 0;
        let cosSum = 0;
        values.forEach(function (deg) {
          const rad = deg * Math.PI / 180;
          sinSum += Math.sin(rad);
          cosSum += Math.cos(rad);
        });
        return normalizeAngle360(Math.atan2(sinSum, cosSum) * 180 / Math.PI);
      }

      function resetHeadingFilter() {
        headingGyroDeg = 0;
        lastGyroTime = null;
        headingFusedDeg = null;
        lastMagHeadingDeg = null;
        headingStateDeg = 0;
        headingBiasDegPerSec = 0;
        headingCov = { p00: 400, p01: 0, p10: 0, p11: 25 };
        headingInitialized = false;
        headingInitStartMs = null;
        initialHeadingSamples = [];
        driftWarningCount = 0;
      }

      function initializeHeadingFilter(nowMs, initialHeadingDeg) {
        const headingDeg = normalizeAngle360(initialHeadingDeg);
        headingStateDeg = headingDeg;
        headingGyroDeg = headingDeg;
        headingFusedDeg = headingDeg;
        headingBiasDegPerSec = 0;
        headingCov = { p00: 25, p01: 0, p10: 0, p11: 4 };
        headingInitialized = true;
        lastGyroTime = nowMs;
        lastMagHeadingDeg = headingDeg;
      }

      function predictHeadingEkf(yawRateDegSec, nowMs) {
        if (lastGyroTime == null) {
          lastGyroTime = nowMs;
          return;
        }
        const dt = Math.min((nowMs - lastGyroTime) / 1000, 0.1);
        lastGyroTime = nowMs;
        if (!headingInitialized || dt <= 0) return;

        const signedYawRateDegSec = GYRO_ALPHA_SIGN * yawRateDegSec;
        headingStateDeg = normalizeAngle360(headingStateDeg + (signedYawRateDegSec - headingBiasDegPerSec) * dt);
        headingGyroDeg = headingStateDeg;
        headingFusedDeg = headingStateDeg;

        const p00 = headingCov.p00;
        const p01 = headingCov.p01;
        const p10 = headingCov.p10;
        const p11 = headingCov.p11;
        const qHeading = headingFilterConfig.processNoiseHeadingDeg2PerSec;
        const qBias = headingFilterConfig.processNoiseBiasDeg2PerSec;
        const q00 = qHeading * dt + qBias * dt * dt * dt / 3;
        const q01 = -qBias * dt * dt / 2;
        const q11 = qBias * dt;

        headingCov.p00 = p00 - dt * p01 - dt * p10 + dt * dt * p11 + q00;
        headingCov.p01 = p01 - dt * p11 + q01;
        headingCov.p10 = p10 - dt * p11 + q01;
        headingCov.p11 = p11 + q11;
      }

      function updateHeadingEkf(measuredHeadingDeg) {
        if (!headingInitialized) return 0;

        const magJump = lastMagHeadingDeg != null
          ? Math.abs(angularDiffDeg(lastMagHeadingDeg, measuredHeadingDeg))
          : 0;
        lastMagHeadingDeg = measuredHeadingDeg;

        const innovationDeg = angularDiffDeg(headingStateDeg, measuredHeadingDeg);
        const measurementNoise = magJump > headingFilterConfig.magJumpThresholdDeg
          ? headingFilterConfig.measNoiseDisturbedDeg2
          : headingFilterConfig.measNoiseStableDeg2;
        const s = headingCov.p00 + measurementNoise;
        const k0 = headingCov.p00 / s;
        const k1 = headingCov.p10 / s;
        const p00 = headingCov.p00;
        const p01 = headingCov.p01;
        const p10 = headingCov.p10;
        const p11 = headingCov.p11;

        headingStateDeg = normalizeAngle360(headingStateDeg + k0 * innovationDeg);
        headingBiasDegPerSec += k1 * innovationDeg;
        headingCov.p00 = (1 - k0) * p00;
        headingCov.p01 = (1 - k0) * p01;
        headingCov.p10 = p10 - k1 * p00;
        headingCov.p11 = p11 - k1 * p01;
        headingFusedDeg = headingStateDeg;
        return innovationDeg;
      }

      function onMotion(e) {
        const acc = e.acceleration;
        if (acc) {
          accX.textContent = formatNum(acc.x);
          accY.textContent = formatNum(acc.y);
          accZ.textContent = formatNum(acc.z);
          const mag = Math.sqrt((acc.x || 0) * (acc.x || 0) + (acc.y || 0) * (acc.y || 0) + (acc.z || 0) * (acc.z || 0));
          const viRaw = Math.min(100, mag * 16);
          viLevel = viLevel * 0.78 + viRaw * 0.22;
          if (viFill) viFill.style.width = viLevel.toFixed(0) + '%';
          if (viValue) viValue.textContent = viLevel.toFixed(0);
          if (viFillTop) viFillTop.style.width = viLevel.toFixed(0) + '%';
          if (viValueTop) viValueTop.textContent = viLevel.toFixed(0);
          pushPlot(sensorPlots.acc, acc.x, acc.y, acc.z);
          stepDetect(acc, Date.now());
        }
        const rot = e.rotationRate;
        const now = Date.now();
        if (rot && rot.alpha != null && !Number.isNaN(rot.alpha)) {
          let yawRateDegSec = rot.alpha;
          const accG = e.accelerationIncludingGravity;
          if (accG && accG.x != null && accG.y != null && accG.z != null) {
            // Project gyro onto gravity so yaw integration still works when phone pose changes.
            const gNorm = Math.sqrt(accG.x * accG.x + accG.y * accG.y + accG.z * accG.z);
            if (gNorm > 2) {
              const ux = accG.x / gNorm;
              const uy = accG.y / gNorm;
              const uz = accG.z / gNorm;
              const rotX = rot.gamma != null && !Number.isNaN(rot.gamma) ? rot.gamma : 0;
              const rotY = rot.beta != null && !Number.isNaN(rot.beta) ? rot.beta : 0;
              const rotZ = rot.alpha;
              yawRateDegSec = rotX * ux + rotY * uy + rotZ * uz;
            }
          }
          predictHeadingEkf(yawRateDegSec, now);
          gyroAlpha.textContent = formatNum(rot.alpha);
          gyroBeta.textContent = formatNum(rot.beta);
          gyroGamma.textContent = formatNum(rot.gamma);
          pushPlot(sensorPlots.gyro, rot.alpha, rot.beta, rot.gamma);
        }
        stepsEl.textContent = String(stepCount);
        updateTrajectory();
        pushSample(e, lastOrientation);
      }

      function onOrientation(e) {
        const now = Date.now();
        const webkitHeading = (e.webkitCompassHeading != null && !Number.isNaN(e.webkitCompassHeading))
          ? normalizeAngle360(e.webkitCompassHeading)
          : null;
        const compassHeading = webkitHeading != null
          ? webkitHeading
          : (e.alpha != null && !Number.isNaN(e.alpha) ? normalizeAngle360(e.alpha) : null);
        lastOrientation = {
          alpha: e.alpha,
          beta: e.beta,
          gamma: e.gamma,
          absolute: e.absolute,
          webkitCompassHeading: e.webkitCompassHeading
        };
        orientAlpha.textContent = formatNum(compassHeading != null ? compassHeading : e.alpha);
        orientBeta.textContent = formatNum(e.beta);
        orientGamma.textContent = formatNum(e.gamma);
        pushPlot(sensorPlots.orient, compassHeading != null ? compassHeading : e.alpha, e.beta, e.gamma);
        if (compassHeading != null) {
          if (!headingInitialized) {
            if (headingInitStartMs == null) headingInitStartMs = now;
            initialHeadingSamples.push(webkitHeading != null ? webkitHeading : compassHeading);
            const initWindowDone = (now - headingInitStartMs) >= headingFilterConfig.initWindowMs;
            if ((initWindowDone || initialHeadingSamples.length >= headingFilterConfig.minInitSamples) && initialHeadingSamples.length > 0) {
              initializeHeadingFilter(now, circularMeanDeg(initialHeadingSamples));
            } else {
              headingFusedDeg = circularMeanDeg(initialHeadingSamples);
            }
          }
          if (headingInitialized) {
            const diff = Math.abs(updateHeadingEkf(compassHeading));
            if (diff > DRIFT_THRESHOLD_DEG) {
              driftWarningCount++;
              if (driftWarningCount >= DRIFT_WARN_SAMPLES) setMessage('可能发生航向漂移，建议在地标处校准。', 'error');
            } else driftWarningCount = 0;
          }
        }
        updateTrajectoryHeadingOnly();
      }

      function startListeners() {
        window.addEventListener('devicemotion', onMotion, { passive: true });
        window.addEventListener('deviceorientation', onOrientation, { passive: true });
      }

      function stopListeners() {
        window.removeEventListener('devicemotion', onMotion);
        window.removeEventListener('deviceorientation', onOrientation);
      }

      async function requestPermission() {
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
          try {
            const perm = await DeviceMotionEvent.requestPermission();
            if (perm !== 'granted') {
              setMessage('运动传感器权限被拒绝。', 'error');
              return false;
            }
          } catch (err) {
            setMessage('权限请求异常：' + err.message, 'error');
            return false;
          }
        }
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            const perm = await DeviceOrientationEvent.requestPermission();
            if (perm !== 'granted') {
              setMessage('方向传感器权限被拒绝。', 'error');
              return false;
            }
          } catch (err) {
            setMessage('方向权限请求异常：' + err.message, 'error');
            return false;
          }
        }
        return true;
      }

      async function startRecording() {
        indoorCorrectionEnabled = false;
        updateIndoorCorrectionButton();
        setMapHintVisible(false);
        setMessage('正在请求传感器权限…', '');
        const ok = await requestPermission();
        if (!ok) return;

        recordedVideoChunks = [];
        recordedVideoBlob = null;
        btnDownloadVideo.disabled = true;

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } },
            audio: false
          });
          videoPreview.srcObject = mediaStream;
          videoPlaceholder.style.display = 'none';
          videoPreview.style.display = 'block';

          videoTrack = mediaStream.getVideoTracks()[0] || null;
          zoomCap = null;
          if (videoTrack && typeof videoTrack.getCapabilities === 'function') {
            const cap = videoTrack.getCapabilities();
            if (cap.zoom && (cap.zoom.min !== undefined || cap.zoom.max !== undefined)) {
              zoomCap = {
                min: cap.zoom.min != null ? cap.zoom.min : 1,
                max: cap.zoom.max != null ? cap.zoom.max : 4,
                step: cap.zoom.step != null ? cap.zoom.step : 0.1
              };
            }
          }
          if (zoomCap) {
            videoZoomWrap.classList.add('visible');
            zoomSlider.min = zoomCap.min;
            zoomSlider.max = zoomCap.max;
            zoomSlider.step = zoomCap.step;
            zoomSlider.value = zoomCap.min;
            zoomValue.textContent = zoomCap.min + '×';
            applyZoom(zoomCap.min);
          } else {
            videoZoomWrap.classList.remove('visible');
          }
          updateStageHeight();

          const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
            ? 'video/webm;codecs=vp9'
            : MediaRecorder.isTypeSupported('video/webm')
              ? 'video/webm'
              : '';
          const options = mimeType ? { mimeType } : {};
          mediaRecorder = new MediaRecorder(mediaStream, options);
          mediaRecorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) recordedVideoChunks.push(e.data);
          };
          mediaRecorder.start(250);
        } catch (err) {
          setMessage('相机不可用：' + err.message + '。仍会继续记录 IMU。', 'error');
          if (mediaStream) {
            mediaStream.getTracks().forEach(function (t) { t.stop(); });
            mediaStream = null;
          }
        }

        recordBuffer = [];
        stepCount = 0;
        lastStepCountForTrajectory = 0;
        viLevel = 0;
        trajectory = { path: [{ x: 0, y: 0 }], x: 0, y: 0, headingDeg: null };
        stepHistory = [];
        totalDistanceM = 0;
        lastStepTime = 0;
        lastStepDetectTime = null;
        bpHpPrev = 0;
        bpLpPrev = 0;
        lastMagRaw = null;
        magBuffer = [];
        magPrev2 = null;
        magPrev1 = null;
        minSinceLastStep = Infinity;
        hadValleySinceLastStep = true;
        resetHeadingFilter();
        if (viFill) viFill.style.width = '0%';
        if (viValue) viValue.textContent = '0';
        if (viFillTop) viFillTop.style.width = '0%';
        if (viValueTop) viValueTop.textContent = '0';
        recording = true;
        startListeners();
        statusEl.className = 'status recording';
        statusText.textContent = '记录中…';
        btnStart.disabled = true;
        btnStop.disabled = false;
        btnDownload.disabled = false;
        setMessage('正在记录，行走即可计步。', 'success');
      }

      function stopRecording() {
        recording = false;
        stopListeners();

        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          const recorderMime = mediaRecorder.mimeType || 'video/webm';
          mediaRecorder.onstop = function () {
            if (recordedVideoChunks.length > 0) {
              recordedVideoBlob = new Blob(recordedVideoChunks, { type: recorderMime });
              btnDownloadVideo.disabled = false;
              setMessage('已停止，可下载 JSON 或视频。', 'success');
            } else {
              setMessage('已停止。没有视频数据（请录制几秒后重试）。', '');
            }
            if (mediaStream) {
              mediaStream.getTracks().forEach(function (t) { t.stop(); });
              mediaStream = null;
            }
            videoPreview.srcObject = null;
            videoPreview.style.display = 'none';
            videoPlaceholder.style.display = 'flex';
          };
          mediaRecorder.stop();
        } else if (mediaStream) {
          mediaStream.getTracks().forEach(function (t) { t.stop(); });
          mediaStream = null;
          videoPreview.srcObject = null;
          videoPreview.style.display = 'none';
          videoPlaceholder.style.display = 'flex';
        }
        mediaRecorder = null;
        videoTrack = null;
        zoomCap = null;
        videoZoomWrap.classList.remove('visible');
        updateStageHeight();

        statusEl.className = 'status idle';
        statusText.textContent = '已停止';
        btnStart.disabled = false;
        btnStop.disabled = true;
        setMessage('已停止，可以下载记录数据。', '');
      }

      function downloadData() {
        const trajectoryForApe = trajectory.path.map(function (p, i) {
          const sh = i > 0 ? stepHistory[i - 1] : null;
          return { t: sh ? sh.ts : null, x: p.x, y: p.y };
        });
        const meta = {
          recordedAt: new Date().toISOString(),
          durationMs: recordBuffer.length ? recordBuffer[recordBuffer.length - 1].t - recordBuffer[0].t : 0,
          stepCount,
          sampleCount: recordBuffer.length,
          totalDistanceM: totalDistanceM,
          weinbergK: K_weinberg,
          mapOrigin: { lat: mapOriginLat, lng: mapOriginLng },
          trajectory: { path: trajectory.path, finalPosition: { x: trajectory.x, y: trajectory.y } },
          stepHistory: stepHistory,
          trajectory_for_ape: trajectoryForApe
        };
        const blob = new Blob([JSON.stringify({ meta, samples: recordBuffer }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = '旅客定位记录-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.json';
        a.click();
        URL.revokeObjectURL(a.href);
        setMessage('已开始下载。', 'success');
      }

      function applyZoom(value) {
        if (!videoTrack || !zoomCap) return;
        const num = Math.max(zoomCap.min, Math.min(zoomCap.max, Number(value)));
        videoTrack.applyConstraints({ zoom: num }).catch(function (err) {
          setMessage('缩放失败：' + err.message, 'error');
        });
        zoomSlider.value = num;
        zoomValue.textContent = Math.round(num * 10) / 10 + '×';
      }

      function downloadVideo() {
        if (!recordedVideoBlob) return;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(recordedVideoBlob);
        a.download = '旅客定位视频-' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.webm';
        a.click();
        URL.revokeObjectURL(a.href);
        setMessage('视频开始下载。', 'success');
      }

      btnStart.addEventListener('click', startRecording);
      btnStop.addEventListener('click', stopRecording);
      btnDownload.addEventListener('click', downloadData);
      btnDownloadVideo.addEventListener('click', downloadVideo);
      btnResetAll.addEventListener('click', resetAll);
      btnResetTrajectory.addEventListener('click', resetAll);
      btnIndoorCorrection.addEventListener('click', function () {
        indoorCorrectionEnabled = !indoorCorrectionEnabled;
        updateIndoorCorrectionButton();
        drawTrajectory();
      });

      btnZoomOut.addEventListener('click', function () {
        const v = Math.max(zoomCap ? zoomCap.min : 1, Number(zoomSlider.value) - (zoomCap ? zoomCap.step : 0.5));
        applyZoom(v);
      });
      btnZoomIn.addEventListener('click', function () {
        const v = Math.min(zoomCap ? zoomCap.max : 4, Number(zoomSlider.value) + (zoomCap ? zoomCap.step : 0.5));
        applyZoom(v);
      });
      zoomSlider.addEventListener('input', function () {
        applyZoom(zoomSlider.value);
      });
      tagTrajectory.addEventListener('click', function () { setFrontCard('trajectory'); });
      tagSensors.addEventListener('click', function () { setFrontCard('sensors'); });
      tagVideo.addEventListener('click', function () { setFrontCard('video'); });

      window.addEventListener('resize', function () {
        drawTrajectory();
        if (map) map.invalidateSize();
        drawPlot(sensorPlots.acc);
        drawPlot(sensorPlots.gyro);
        drawPlot(sensorPlots.orient);
      });
      if (mapContainer) initMap();
      drawTrajectory();
      setFrontCard('trajectory');
      setMapHintVisible(true);
      updateIndoorCorrectionButton();
      drawPlot(sensorPlots.acc);
      drawPlot(sensorPlots.gyro);
      drawPlot(sensorPlots.orient);

      if (!window.DeviceMotionEvent) {
        setMessage('当前设备或浏览器不支持运动传感器。', 'error');
        btnStart.disabled = true;
      }
    })();
  </script>
</body>
</html>
